openapi: 3.0.3
info:
  title: Data Model Service API
  version: 0.1.0
  description: |-
    Standalone tenant-aware data model service for managing:
    - tenant registration and schema provisioning
    - logical metadata for tables, fields, links, pivots, and table options
    - physical per-tenant PostgreSQL schema changes
    - schema change history and tenant schema migration history
    - reconciliation between metadata and physical tenant schemas

    Typical workflow:
    1. Create a tenant.
    2. Provision the tenant schema.
    3. Create tables and fields.
    4. Add links, pivots, and table options as needed.
    5. Read the assembled data model through `/v1/tenants/{tenantId}/data-model`.

    Delete operations support `dry_run=true`.
    In V1, destructive operations are hard deletes. When a delete is blocked by internal dependencies, the API returns `409` with a delete report that lists the conflicts.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: health
    description: Liveness and readiness probes for runtime and database availability.
  - name: tenants
    description: Tenant registration and physical schema provisioning.
  - name: data-model
    description: CRUD operations for tables, fields, links, pivots, and table options.
  - name: index-jobs
    description: Async managed-index job enqueueing, inspection, and retry operations.
  - name: schema-changes
    description: Audit-style history for logical and physical schema operations.
  - name: reconcile
    description: Administrative reconciliation between metadata and physical tenant schemas.
paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      description: "Returns 200 when the service process is running."
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      description: "Returns 200 when the service can reach its database dependency."
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '503':
          description: Database is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyErrorResponse'
  /v1/tenants:
    post:
      tags: [tenants]
      operationId: createTenant
      summary: Create tenant
      description: Registers a tenant in metadata. This does not provision the tenant's physical PostgreSQL schema yet.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [tenants]
      operationId: listTenants
      summary: List tenants
      description: Lists all registered tenants and their current provisioning status.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}:
    get:
      tags: [tenants]
      operationId: getTenant
      summary: Get tenant
      description: Returns one tenant by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/provision:
    post:
      tags: [tenants]
      operationId: provisionTenant
      summary: Provision tenant schema
      description: Creates the tenant's physical PostgreSQL schema and marks the tenant as provisioned.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tenant provisioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/data-model:
    get:
      tags: [data-model]
      operationId: getAssembledDataModel
      summary: Get assembled data model
      description: Returns the tenant's published assembled read model for downstream ingestion, including a versioned revision id, tenant writability metadata, tables, fields, links, pivots, navigation options, and table options.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Assembled data model
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_model:
                    $ref: '#/components/schemas/AssembledDataModel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}/data-model/export:
    get:
      tags: [data-model]
      operationId: exportPortableDataModel
      summary: Export portable data model JSON
      description: Returns a portable JSON document for the tenant data model using stable table, field, and link names instead of internal UUIDs. Managed system fields are omitted from the exported field list because they are recreated automatically during import.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Portable data model export
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_model:
                    $ref: '#/components/schemas/PortableDataModelDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}/data-model/import:
    post:
      tags: [data-model]
      operationId: importPortableDataModel
      summary: Import portable data model JSON
      description: Imports a portable JSON document into an existing tenant by replaying table, field, link, pivot, table-option, and navigation-option creation through the standard service flows. Import is best-effort across multiple operations and is not wrapped in one global transaction for the whole document.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortableImportRequest'
      responses:
        '200':
          description: Portable data model imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortableImportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}/tables:
    get:
      tags: [data-model]
      operationId: listTables
      summary: List tenant tables
      description: Lists the logical tables currently defined for one tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Table list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tables:
                    type: array
                    items:
                      $ref: '#/components/schemas/Table'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [data-model]
      operationId: createTable
      summary: Create table
      description: Creates a logical table and its physical tenant table in the provisioned tenant schema.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableRequest'
      responses:
        '201':
          description: Table created
          content:
            application/json:
              schema:
                type: object
                properties:
                  table:
                    $ref: '#/components/schemas/Table'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tables/{tableId}:
    patch:
      tags: [data-model]
      operationId: updateTable
      summary: Update table
      description: Updates mutable table metadata. The table name is immutable after creation.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTableRequest'
      responses:
        '200':
          description: Table updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  table:
                    $ref: '#/components/schemas/Table'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [data-model]
      operationId: deleteTable
      summary: Delete table
      description: |-
        Deletes a table from metadata and the tenant schema.

        Use dry_run=true to check whether the table can be deleted without performing the delete.
        If internal dependencies block deletion, the API returns 409 with a conflict report.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
        - $ref: '#/components/parameters/DryRun'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Delete conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
  /v1/tables/{tableId}/fields:
    get:
      tags: [data-model]
      operationId: listFields
      summary: List table fields
      description: Lists the fields currently defined for one table.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      responses:
        '200':
          description: Field list
          content:
            application/json:
              schema:
                type: object
                properties:
                  fields:
                    type: array
                    items:
                      $ref: '#/components/schemas/Field'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [data-model]
      operationId: createField
      summary: Create field
      description: Creates a field in metadata and adds the backing column to the tenant's physical table.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldRequest'
      responses:
        '201':
          description: Field created
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    $ref: '#/components/schemas/Field'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/fields/{fieldId}/enum-values:
    get:
      tags: [data-model]
      operationId: listFieldEnumValues
      summary: List field enum values
      description: Returns the managed enum values for one enum field.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FieldId'
      responses:
        '200':
          description: Enum value list
          content:
            application/json:
              schema:
                type: object
                properties:
                  enum_values:
                    type: array
                    items:
                      $ref: '#/components/schemas/FieldEnumValue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [data-model]
      operationId: createFieldEnumValue
      summary: Create field enum value
      description: Creates one managed enum value for a field marked with is_enum=true.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FieldId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldEnumValueRequest'
      responses:
        '201':
          description: Enum value created
          content:
            application/json:
              schema:
                type: object
                properties:
                  enum_value:
                    $ref: '#/components/schemas/FieldEnumValue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/fields/{fieldId}:
    patch:
      tags: [data-model]
      operationId: updateField
      summary: Update field
      description: Updates mutable field metadata and applies compatible physical schema changes where needed.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FieldId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldRequest'
      responses:
        '200':
          description: Field updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    $ref: '#/components/schemas/Field'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [data-model]
      operationId: deleteField
      summary: Delete field
      description: |-
        Deletes a field from metadata and drops the backing physical column.

        Use dry_run=true to inspect conflicts before deleting.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FieldId'
        - $ref: '#/components/parameters/DryRun'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Delete conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
  /v1/enum-values/{enumValueId}:
    patch:
      tags: [data-model]
      operationId: updateFieldEnumValue
      summary: Update field enum value
      description: Updates one managed enum value.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EnumValueId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldEnumValueRequest'
      responses:
        '200':
          description: Enum value updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  enum_value:
                    $ref: '#/components/schemas/FieldEnumValue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [data-model]
      operationId: deleteFieldEnumValue
      summary: Delete field enum value
      description: Deletes one managed enum value from a field.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EnumValueId'
      responses:
        '204':
          description: Enum value deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/links:
    get:
      tags: [data-model]
      operationId: listLinks
      summary: List tenant links
      description: Lists the logical links currently defined for one tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Link list
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items:
                      $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [data-model]
      operationId: createLink
      summary: Create link
      description: Creates a logical relationship between a parent field and a child field within the tenant model.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  link:
                    $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/links/{linkId}:
    delete:
      tags: [data-model]
      operationId: deleteLink
      summary: Delete link
      description: |-
        Deletes a logical link.

        Use dry_run=true to inspect whether pivots or other internal references block the delete.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LinkId'
        - $ref: '#/components/parameters/DryRun'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Delete conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
  /v1/tenants/{tenantId}/pivots:
    get:
      tags: [data-model]
      operationId: listPivots
      summary: List pivots
      description: Lists pivot definitions for a tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Pivot list
          content:
            application/json:
              schema:
                type: object
                properties:
                  pivots:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pivot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [data-model]
      operationId: createPivot
      summary: Create pivot
      description: Creates a pivot rooted at a base table, optionally using a field and a path of link ids.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePivotRequest'
      responses:
        '201':
          description: Pivot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  pivot:
                    $ref: '#/components/schemas/Pivot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/pivots/{pivotId}:
    delete:
      tags: [data-model]
      operationId: deletePivot
      summary: Delete pivot
      description: "Deletes a pivot definition. dry_run=true returns a delete report without performing the delete."
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PivotId'
        - $ref: '#/components/parameters/DryRun'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tables/{tableId}/options:
    get:
      tags: [data-model]
      operationId: getTableOptions
      summary: Get table options
      description: Returns UI-oriented table options with both raw field ids and resolved field details for displayed fields and field order.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      responses:
        '200':
          description: Table options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [data-model]
      operationId: upsertTableOptions
      summary: Upsert table options
      description: Creates or replaces table options for one table.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableOptionsRequest'
      responses:
        '200':
          description: Table options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tables/{tableId}/navigation-options:
    get:
      tags: [data-model]
      operationId: listNavigationOptions
      summary: List navigation options
      description: Returns stored navigation options for a source table, including resolved table and field names.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      responses:
        '200':
          description: Navigation options
          content:
            application/json:
              schema:
                type: object
                properties:
                  navigation_options:
                    type: array
                    items:
                      $ref: '#/components/schemas/NavigationOption'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [data-model]
      operationId: createNavigationOption
      summary: Create navigation option
      description: Creates navigation-option metadata and enqueues an async managed-index job for the target table.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNavigationOptionRequest'
      responses:
        '201':
          description: Navigation option created
          content:
            application/json:
              schema:
                type: object
                properties:
                  navigation_option:
                    $ref: '#/components/schemas/NavigationOption'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/navigation-options/{navigationOptionId}:
    delete:
      tags: [data-model]
      operationId: deleteNavigationOption
      summary: Delete navigation option
      description: Deletes a stored navigation option.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NavigationOptionId'
      responses:
        '204':
          description: Navigation option deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/schema-change-log:
    get:
      tags: [schema-changes]
      operationId: listSchemaChanges
      summary: List schema changes
      description: Returns the recorded logical and physical schema changes associated with the tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Schema changes
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema_changes:
                    type: array
                    items:
                      $ref: '#/components/schemas/SchemaChange'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}/index-jobs:
    get:
      tags: [index-jobs]
      operationId: listIndexJobs
      summary: List index jobs
      description: Returns async managed-index jobs for one tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Index jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  index_jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/IndexJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [index-jobs]
      operationId: createIndexJob
      summary: Create index job
      description: Enqueues an async managed-index job for a tenant table.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIndexJobRequest'
      responses:
        '201':
          description: Index job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  index_job:
                    $ref: '#/components/schemas/IndexJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/index-jobs/{jobId}:
    get:
      tags: [index-jobs]
      operationId: getIndexJob
      summary: Get index job
      description: Returns one async managed-index job.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Index job
          content:
            application/json:
              schema:
                type: object
                properties:
                  index_job:
                    $ref: '#/components/schemas/IndexJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/index-jobs/{jobId}/retry:
    post:
      tags: [index-jobs]
      operationId: retryIndexJob
      summary: Retry index job
      description: Resets a failed index job back to pending so the worker can claim it again.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Index job retry scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  index_job:
                    $ref: '#/components/schemas/IndexJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/schema-migrations:
    get:
      tags: [schema-changes]
      operationId: listTenantSchemaMigrations
      summary: List tenant schema migrations
      description: Returns the applied tenant schema migration history for one tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tenant schema migration history
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_schema_migrations:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantSchemaMigration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/admin/reconcile:
    get:
      tags: [reconcile]
      operationId: reconcileSchemas
      summary: Run schema reconciliation
      description: Compares metadata state against physical tenant schemas, reports drift, and schedules repair index jobs when managed secondary indexes are missing.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reconciliation report
          content:
            application/json:
              schema:
                type: object
                properties:
                  report:
                    $ref: '#/components/schemas/ReconcileReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Reconciliation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: >
        Required for /v1 routes when auth mode is set to token.
        In local development, auth may be disabled entirely.
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      description: Tenant identifier.
      schema:
        type: string
        format: uuid
    TableId:
      name: tableId
      in: path
      required: true
      description: Table identifier.
      schema:
        type: string
        format: uuid
    FieldId:
      name: fieldId
      in: path
      required: true
      description: Field identifier.
      schema:
        type: string
        format: uuid
    LinkId:
      name: linkId
      in: path
      required: true
      description: Link identifier.
      schema:
        type: string
        format: uuid
    PivotId:
      name: pivotId
      in: path
      required: true
      description: Pivot identifier.
      schema:
        type: string
        format: uuid
    NavigationOptionId:
      name: navigationOptionId
      in: path
      required: true
      description: Navigation option identifier.
      schema:
        type: string
        format: uuid
    JobId:
      name: jobId
      in: path
      required: true
      description: Index job identifier.
      schema:
        type: string
        format: uuid
    EnumValueId:
      name: enumValueId
      in: path
      required: true
      description: Enum value identifier.
      schema:
        type: string
        format: uuid
    DryRun:
      name: dry_run
      in: query
      required: false
      description: "When true, validates delete preconditions and returns a delete report without performing the delete."
      schema:
        type: boolean
  responses:
    BadRequest:
      description: Invalid input, invalid id, or failed domain validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    StatusResponse:
      type: object
      description: Simple health status envelope.
      properties:
        status:
          type: string
          example: ok
      required: [status]
    ReadyErrorResponse:
      type: object
      description: Readiness failure envelope.
      properties:
        status:
          type: string
        error:
          type: string
      required: [status, error]
    ErrorEnvelope:
      type: object
      description: Standard error envelope used by request validation and not-found responses.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: bad_parameter
            message:
              type: string
              example: invalid tenantId
          required: [code, message]
      required: [error]
    CreateTenantRequest:
      type: object
      description: Payload for registering a tenant before physical schema provisioning.
      required: [name]
      properties:
        name:
          type: string
          example: Acme Risk Ops
        external_key:
          type: string
          nullable: true
          example: acme-prod
    Tenant:
      type: object
      description: Tenant metadata record.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        external_key:
          type: string
          nullable: true
        schema_name:
          type: string
          example: tenant_f2a11b37
        status:
          type: string
          example: active
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, schema_name, status, created_at, updated_at]
    CreateTableRequest:
      type: object
      description: Payload for creating a logical table in a tenant.
      required: [name]
      properties:
        name:
          type: string
          example: transactions
        description:
          type: string
        alias:
          type: string
          example: Transactions
        semantic_type:
          type: string
          example: entity
    UpdateTableRequest:
      type: object
      description: Mutable fields for a table. Omitted properties remain unchanged.
      properties:
        description:
          type: string
        alias:
          type: string
        semantic_type:
          type: string
        caption_field:
          type: string
          example: object_id
    Table:
      type: object
      description: Table metadata record.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        alias:
          type: string
        semantic_type:
          type: string
        caption_field:
          type: string
        archived:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, description, alias, semantic_type, caption_field, archived, created_at, updated_at]
    CreateFieldRequest:
      type: object
      description: Payload for creating a field and its backing physical column.
      required: [name, data_type]
      properties:
        name:
          type: string
          example: amount
        description:
          type: string
        data_type:
          type: string
          enum: [bool, int, float, string, timestamp, ip_address]
          example: float
        nullable:
          type: boolean
        is_enum:
          type: boolean
        is_unique:
          type: boolean
        enum_values:
          type: array
          description: Optional inline enum values created transactionally with the field when is_enum=true.
          items:
            $ref: '#/components/schemas/CreateFieldEnumValueRequest'
    UpdateFieldRequest:
      type: object
      description: Mutable field properties. Omitted properties remain unchanged.
      properties:
        description:
          type: string
        nullable:
          type: boolean
        is_enum:
          type: boolean
        is_unique:
          type: boolean
    CreateFieldEnumValueRequest:
      type: object
      description: Payload for creating one enum value for an enum field.
      required: [value, label]
      properties:
        value:
          type: string
          example: pending
        label:
          type: string
          example: Pending
        sort_order:
          type: integer
          example: 10
    UpdateFieldEnumValueRequest:
      type: object
      description: Mutable enum value properties. Omitted properties remain unchanged.
      properties:
        value:
          type: string
        label:
          type: string
        sort_order:
          type: integer
    Field:
      type: object
      description: Field metadata record.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        data_type:
          type: string
        nullable:
          type: boolean
        is_enum:
          type: boolean
        is_unique:
          type: boolean
        archived:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, description, data_type, nullable, is_enum, is_unique, archived, created_at, updated_at]
    FieldEnumValue:
      type: object
      description: One managed enum value belonging to a field.
      properties:
        id:
          type: string
          format: uuid
        field_id:
          type: string
          format: uuid
        value:
          type: string
        label:
          type: string
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, field_id, value, label, sort_order, created_at, updated_at]
    CreateLinkRequest:
      type: object
      description: Payload for creating a logical relationship between two fields.
      required: [name, parent_table_id, parent_field_id, child_table_id, child_field_id]
      properties:
        name:
          type: string
          example: transaction_to_account
        parent_table_id:
          type: string
          format: uuid
        parent_field_id:
          type: string
          format: uuid
        child_table_id:
          type: string
          format: uuid
        child_field_id:
          type: string
          format: uuid
    Link:
      type: object
      description: Link metadata record.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        parent_table_id:
          type: string
          format: uuid
        parent_field_id:
          type: string
          format: uuid
        child_table_id:
          type: string
          format: uuid
        child_field_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required: [id, name, parent_table_id, parent_field_id, child_table_id, child_field_id, created_at]
    CreatePivotRequest:
      type: object
      description: Payload for creating a pivot rooted at a base table.
      required: [base_table_id]
      properties:
        base_table_id:
          type: string
          format: uuid
        field_id:
          type: string
          format: uuid
          nullable: true
        path_link_ids:
          type: array
          items:
            type: string
            format: uuid
    Pivot:
      type: object
      description: Pivot definition.
      properties:
        id:
          type: string
          format: uuid
        base_table_id:
          type: string
          format: uuid
        field_id:
          type: string
          format: uuid
          nullable: true
        path_link_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
      required: [id, base_table_id, path_link_ids, created_at]
    TableOptionsRequest:
      type: object
      description: UI-oriented table options.
      properties:
        displayed_fields:
          type: array
          items:
            type: string
            format: uuid
        field_order:
          type: array
          items:
            type: string
            format: uuid
    CreateNavigationOptionRequest:
      type: object
      description: Payload for creating a navigation option from one source table into a target table.
      properties:
        source_field_id:
          type: string
          format: uuid
        target_table_id:
          type: string
          format: uuid
        filter_field_id:
          type: string
          format: uuid
        ordering_field_id:
          type: string
          format: uuid
      required: [source_field_id, target_table_id, filter_field_id, ordering_field_id]
    TableOptions:
      type: object
      description: Stored table options enriched with resolved field details so clients do not need to separately map field ids back to field names.
      properties:
        id:
          type: string
          format: uuid
        table_id:
          type: string
          format: uuid
        displayed_fields:
          type: array
          items:
            type: string
            format: uuid
        displayed_field_details:
          type: array
          items:
            $ref: '#/components/schemas/TableOptionsFieldDetail'
        field_order:
          type: array
          items:
            type: string
            format: uuid
        field_order_details:
          type: array
          items:
            $ref: '#/components/schemas/TableOptionsFieldDetail'
        updated_at:
          type: string
          format: date-time
      required: [id, table_id, displayed_fields, displayed_field_details, field_order, field_order_details, updated_at]
    TableOptionsFieldDetail:
      type: object
      description: Resolved field metadata for a field referenced by table options.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        data_type:
          type: string
        description:
          type: string
        nullable:
          type: boolean
        is_enum:
          type: boolean
        is_unique:
          type: boolean
      required: [id, name, data_type, description, nullable, is_enum, is_unique]
    NavigationOption:
      type: object
      description: Stored navigation option plus resolved display names.
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        source_table_id:
          type: string
          format: uuid
        source_field_id:
          type: string
          format: uuid
        target_table_id:
          type: string
          format: uuid
        filter_field_id:
          type: string
          format: uuid
        ordering_field_id:
          type: string
          format: uuid
        source_table_name:
          type: string
        source_field_name:
          type: string
        target_table_name:
          type: string
        filter_field_name:
          type: string
        ordering_field_name:
          type: string
        created_at:
          type: string
          format: date-time
      required: [id, tenant_id, source_table_id, source_field_id, target_table_id, filter_field_id, ordering_field_id, source_table_name, source_field_name, target_table_name, filter_field_name, ordering_field_name, created_at]
    DeleteReport:
      type: object
      description: Result of a delete or delete dry-run operation.
      properties:
        performed:
          type: boolean
          description: "True when the delete was executed, false for dry-run or blocked deletes."
        conflicts:
          type: object
          description: Internal reasons the delete could not proceed.
          properties:
            reserved:
              type: boolean
              description: The target is reserved and cannot be deleted.
            links:
              type: array
              description: Link ids that still depend on the target.
              items:
                type: string
                format: uuid
            pivots:
              type: array
              description: Pivot ids that still depend on the target.
              items:
                type: string
                format: uuid
          required: [reserved, links, pivots]
      required: [performed, conflicts]
    AssembledDataModel:
      type: object
      description: Tenant read model assembled from tables, fields, links, pivots, and options, published as the ingestion-safe contract for downstream services.
      properties:
        revision_id:
          type: string
          description: Versioned identifier for the published tenant schema snapshot that downstream ingestion should pin to when validating and writing records.
        ingestion_contract:
          $ref: '#/components/schemas/IngestionContract'
        tables:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AssembledTable'
        pivots:
          type: array
          items:
            $ref: '#/components/schemas/AssembledPivot'
      required: [revision_id, ingestion_contract, tables, pivots]
    PortableImportRequest:
      type: object
      required: [data_model]
      properties:
        data_model:
          $ref: '#/components/schemas/PortableDataModelDocument'
    PortableImportResponse:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/PortableImportSummary'
      required: [summary]
    PortableImportSummary:
      type: object
      properties:
        tables_created:
          type: integer
        fields_created:
          type: integer
        links_created:
          type: integer
        pivots_created:
          type: integer
        table_options_upserted:
          type: integer
        navigation_options_created:
          type: integer
        revision_id:
          type: string
      required: [tables_created, fields_created, links_created, pivots_created, table_options_upserted, navigation_options_created, revision_id]
    PortableDataModelDocument:
      type: object
      description: Portable import/export representation that uses stable names for references so a model can be moved between tenants without reusing source UUIDs.
      properties:
        version:
          type: string
          example: v1
        revision_id:
          type: string
          description: Source revision id at export time. Import currently ignores this value.
        tables:
          type: array
          items:
            $ref: '#/components/schemas/PortableTableDocument'
        links:
          type: array
          items:
            $ref: '#/components/schemas/PortableLinkDocument'
        pivots:
          type: array
          items:
            $ref: '#/components/schemas/PortablePivotDocument'
      required: [version, tables, links, pivots]
    PortableTableDocument:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        alias:
          type: string
        semantic_type:
          type: string
        caption_field:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/PortableFieldDocument'
        options:
          $ref: '#/components/schemas/PortableTableOptionsDocument'
          nullable: true
        navigation_options:
          type: array
          items:
            $ref: '#/components/schemas/PortableNavigationOptionDocument'
      required: [name, description, alias, semantic_type, caption_field, fields, navigation_options]
    PortableFieldDocument:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        data_type:
          type: string
          enum: [bool, int, float, string, timestamp, ip_address]
        nullable:
          type: boolean
        is_enum:
          type: boolean
        is_unique:
          type: boolean
        enum_values:
          type: array
          items:
            $ref: '#/components/schemas/CreateFieldEnumValueRequest'
      required: [name, description, data_type, nullable, is_enum, is_unique, enum_values]
    PortableTableOptionsDocument:
      type: object
      properties:
        displayed_fields:
          type: array
          items:
            type: string
        field_order:
          type: array
          items:
            type: string
      required: [displayed_fields, field_order]
    PortableNavigationOptionDocument:
      type: object
      properties:
        source_field:
          type: string
        target_table:
          type: string
        filter_field:
          type: string
        ordering_field:
          type: string
      required: [source_field, target_table, filter_field, ordering_field]
    PortableLinkDocument:
      type: object
      properties:
        name:
          type: string
        parent_table:
          type: string
        parent_field:
          type: string
        child_table:
          type: string
        child_field:
          type: string
      required: [name, parent_table, parent_field, child_table, child_field]
    PortablePivotDocument:
      type: object
      properties:
        base_table:
          type: string
        field:
          type: string
        path_links:
          type: array
          items:
            type: string
      required: [base_table]
    IngestionContract:
      type: object
      description: Downstream write contract that tells ingestion consumers whether the tenant is writable and which physical/system fields are managed by the data-model service.
      properties:
        tenant_status:
          type: string
          example: active
        writable:
          type: boolean
        managed_system_fields:
          type: array
          items:
            type: string
        record_lookup_field:
          type: string
          example: object_id
        partial_updates:
          type: boolean
      required: [tenant_status, writable, managed_system_fields, record_lookup_field, partial_updates]
    AssembledTable:
      type: object
      description: Table entry inside the assembled read model.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        alias:
          type: string
        semantic_type:
          type: string
        caption_field:
          type: string
        archived:
          type: boolean
        fields:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AssembledField'
        links_to_single:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AssembledLink'
        navigation_options:
          type: array
          description: Stored navigation options for the table.
          items:
            $ref: '#/components/schemas/NavigationOption'
        options:
          $ref: '#/components/schemas/TableOptions'
          nullable: true
      required: [id, name, description, alias, semantic_type, caption_field, archived, fields, links_to_single, navigation_options]
    AssembledField:
      type: object
      description: Field entry inside the assembled read model.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        data_type:
          type: string
        nullable:
          type: boolean
        is_enum:
          type: boolean
        is_unique:
          type: boolean
        archived:
          type: boolean
        enum_values:
          type: array
          items:
            $ref: '#/components/schemas/FieldEnumValue'
      required: [id, name, description, data_type, nullable, is_enum, is_unique, archived, enum_values]
    AssembledLink:
      type: object
      description: Link entry inside the assembled read model.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        parent_table_id:
          type: string
          format: uuid
        parent_field_id:
          type: string
          format: uuid
        child_table_id:
          type: string
