services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ingestion
      POSTGRES_USER: ingestion
      POSTGRES_PASSWORD: ingestion
    ports:
      - "5435:5432"
    volumes:
      - ingestion_pg_data:/var/lib/postgresql/data

  ingestion-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8081
      DATABASE_URL: postgres://ingestion:ingestion@postgres:5432/ingestion?sslmode=disable
      DATA_MODEL_SERVICE_URL: http://host.docker.internal:8080
      SERVICE_AUTH_MODE: disabled
      LOG_LEVEL: info
      GIN_MODE: debug
      HTTP_CLIENT_TIMEOUT: 10s
      WORKER_POLL_INTERVAL: 5s
      WORKER_MAX_ATTEMPTS: 3
    depends_on:
      - postgres
    ports:
      - "8081:8081"

  ingestion-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/ingestion-worker"]
    environment:
      DATABASE_URL: postgres://ingestion:ingestion@postgres:5432/ingestion?sslmode=disable
      DATA_MODEL_SERVICE_URL: http://host.docker.internal:8080
      SERVICE_AUTH_MODE: disabled
      LOG_LEVEL: info
      HTTP_CLIENT_TIMEOUT: 10s
      WORKER_POLL_INTERVAL: 5s
      WORKER_MAX_ATTEMPTS: 3
    depends_on:
      - postgres

volumes:
  ingestion_pg_data:
