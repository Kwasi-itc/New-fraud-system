    SearchQuery:
      type: object
      description: One search query sent to the screening provider.
      required: [name, type]
      properties:
        name:
          type: string
          description: Name or label to screen.
          example: Acme Ltd
        type:
          type: string
          description: Entity type being screened.
          example: Organization
        filters:
          type: object
          additionalProperties: true
          description: Optional provider-side query filters.
    CreateScreeningRequest:
      type: object
      description: Payload for creating a screening request.
      required:
        - provider
        - idempotency_key
        - object_type
        - object_id
        - queries
      properties:
        provider:
          type: string
          description: Screening provider key.
          example: opensanctions
        decision_id:
          type: string
          format: uuid
          description: Decision associated with the screening when applicable.
        scenario_id:
          type: string
          format: uuid
          description: Scenario associated with the screening when applicable.
        screening_config_id:
          type: string
          format: uuid
          description: Screening configuration associated with the request when applicable.
        idempotency_key:
          type: string
          description: Key used to deduplicate repeated screening intake calls.
        object_type:
          type: string
          description: Object type for the screened record.
          example: transactions
        object_id:
          type: string
          description: External record identifier for the screened record.
        queries:
          type: array
          description: Provider search queries to execute.
          items:
            $ref: '#/components/schemas/SearchQuery'
        provider_config:
          type: object
          additionalProperties: true
          description: Provider-specific configuration overrides.
        limit_override:
          type: integer
          description: Optional result-limit override for the provider call.
        unique_counterparty_identifier:
          type: string
          description: Optional counterparty identifier used in screening and whitelist flows.
      example:
        provider: opensanctions
        decision_id: 8c8d8e1d-37f2-4d77-9b88-5a2afba97310
        scenario_id: b41b3c31-d516-47aa-8b73-a4d0458fcbcf
        screening_config_id: a8fe9d01-2f76-4d8d-b77f-6de221a87c9a
        idempotency_key: screening-req-42
        object_type: transactions
        object_id: txn_100234
        queries:
          - name: Example Trading Ltd
            type: Organization
