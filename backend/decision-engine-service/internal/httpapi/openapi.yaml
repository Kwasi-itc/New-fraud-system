        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRiskSnapshotRequest'
      responses:
        '201':
          description: Risk snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskSnapshotEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/platform/ip-flags:
    get:
      tags: [Platform Helpers]
      summary: List IP flags by tenant
      description: Lists stored IP-address flags, optionally filtered to one IP address.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: ip_address
          in: query
          description: Restrict results to one flagged IP address.
          schema:
            type: string
      responses:
        '200':
          description: IP flag list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPFlagListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Platform Helpers]
      summary: Create an IP flag
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIPFlagRequest'
      responses:
        '201':
          description: IP flag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPFlagEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/outbox-events:
    get:
      tags: [Outbox]
      summary: List outbox events by tenant
      description: Lists persisted outbox events for a tenant so operators can inspect pending or delivered downstream work.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: limit
          in: query
          description: Maximum number of outbox events to return.
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Outbox event list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutboxEventListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /internal/screening-status-updates:
    post:
      tags: [Internal]
      summary: Receive screening status updates from the screening service
      description: Internal callback used to update decision-engine screening execution records after downstream screening work completes or changes state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalScreeningStatusUpdateRequest'
            example:
              tenant_id: tenant_demo
              screening_id: sexec_01HZYA6K1R3M7Q9T4N2D8P5CVB
              decision_id: dec_01HZY90B4J4QWQ5TS9N5P7DZ9C
              scenario_id: scen_01HZY8M4TQ8XJ5G7S2B4N9K3PA
              screening_config_id: sconf_01HZYA2N4V8Q3T7K5M1R9D6CPX
              status: completed
              provider: comply-guard
              object_type: transactions
              object_id: txn_100234
              provider_reference: screening-job-42
              last_error: ""
              partial: false
              idempotency_key: screening-callback-42
              completed_at: '2026-07-14T10:23:00Z'
              match_count: 0
      responses:
        '200':
          description: Screening execution updated from callback
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreeningExecutionEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      description: Tenant identifier for the tenant that owns the scenario, decision, workflow, or execution record.
      schema:
        type: string
        format: uuid
    ScenarioId:
      name: scenarioId
      in: path
      required: true
      description: Scenario identifier for one decisioning scenario definition.
      schema:
        type: string
        format: uuid
    IterationId:
      name: iterationId
      in: path
      required: true
      description: Scenario iteration identifier for one draft or live version of a scenario.
      schema:
        type: string
        format: uuid
    RuleId:
      name: ruleId
      in: path
      required: true
      description: Rule identifier for one rule belonging to a scenario iteration or workflow rule set.
      schema:
        type: string
        format: uuid
    DecisionId:
      name: decisionId
      in: path
      required: true
      description: Decision identifier for one persisted scenario evaluation result.
      schema:
        type: string
        format: uuid
    TestRunId:
      name: testRunId
      in: path
      required: true
      description: Test-run identifier for one live-vs-phantom scenario evaluation run.
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Request validation or domain validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    InternalError:
      description: Internal processing failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UpstreamError:
      description: Upstream dependency call failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ReadyErrorResponse:
      type: object
      properties:
        status:
          type: string
        error:
          type: string
      required: [status, error]
    ServiceInfo:
      type: object
      description: Runtime service metadata and configured upstream base URLs.
      properties:
        service:
          type: string
          description: Static service identifier.
        data_model_service_url:
          type: string
          description: Base URL for the configured `data-model-service` dependency.
        ingestion_service_url:
          type: string
          description: Base URL for the configured `ingestion-service` dependency.
      required: [service, data_model_service_url, ingestion_service_url]
    ErrorEnvelope:
      type: object
      properties:
        error:
          type: string
        details:
          type: string
      required: [error]
    JSONValue:
      type: object
      additionalProperties: true
    ASTNode:
      oneOf:
        - type: object
          properties:
            function:
              type: string
            constant: {}
            children:
              type: array
              items:
                $ref: '#/components/schemas/ASTNode'
            named_children:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/ASTNode'
          additionalProperties: true
        - type: array
          items: {}
        - type: string
        - type: number
        - type: boolean
    ASTNodeDTO:
      type: object
      properties:
        name:
          type: string
        constant: {}
        children:
          type: array
          items:
            $ref: '#/components/schemas/ASTNodeDTO'
        named_children:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ASTNodeDTO'
      additionalProperties: false
    CreateScenarioRequest:
      type: object
      description: Payload for creating or updating a scenario definition.
      properties:
        name:
          type: string
          description: Human-readable scenario name.
        description:
          type: string
          description: Free-form explanation of what the scenario is intended to detect or decide.
        trigger_object_type:
          type: string
          description: Object type this scenario evaluates. In practice this matches the tenant data-model table name for incoming records, such as `transactions` or `customers`.
      required: [name, trigger_object_type]
      example:
        name: High Amount Review
        description: Review high-value transactions from new counterparties.
        trigger_object_type: transactions
    CopyScenarioRequest:
      type: object
      description: Optional values to use when creating a copied scenario.
      properties:
        name:
          type: string
          description: Name to give the copied scenario.
      example:
        name: High Amount Review Copy
    ScenarioResponse:
      type: object
      description: Scenario definition owned by one tenant.
      properties:
        id:
          type: string
          description: Stable scenario identifier.
        tenant_id:
          type: string
          description: Tenant that owns the scenario.
        name:
          type: string
          description: Human-readable scenario name.
        description:
          type: string
          description: Free-form explanation of the scenario.
        trigger_object_type:
          type: string
          description: Object type the scenario evaluates. This matches the tenant model table name for the target records.
        live_iteration_id:
          type: string
          nullable: true
          description: Currently active live iteration for the scenario, when one exists.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, tenant_id, name, description, trigger_object_type, created_at, updated_at]
      example:
        id: scen_01HZY8M4TQ8XJ5G7S2B4N9K3PA
        tenant_id: tenant_demo
        name: High Amount Review
        description: Review high-value transactions from new counterparties.
        trigger_object_type: transactions
        live_iteration_id: iter_01HZY8NXVYH7V3A6TQ1M2C8W4F
        created_at: '2026-07-14T09:00:00Z'
        updated_at: '2026-07-14T09:15:00Z'
    IterationResponse:
      type: object
      description: One versioned scenario iteration, usually draft or live.
      properties:
        id:
          type: string
          description: Stable iteration identifier.
        scenario_id:
          type: string
          description: Parent scenario for this iteration.
        tenant_id:
          type: string
          description: Tenant that owns the iteration.
        version:
          type: integer
          description: Version number assigned to the iteration within the scenario.
        status:
          type: string
          description: Iteration lifecycle state, such as draft or live.
        trigger_formula:
          $ref: '#/components/schemas/ASTNode'
        score_review_threshold:
          type: integer
          nullable: true
          description: Minimum total score that yields a review outcome when configured.
        score_block_and_review_threshold:
          type: integer
          nullable: true
          description: Minimum total score that yields a block-and-review outcome when configured.
        score_decline_threshold:
          type: integer
          nullable: true
          description: Minimum total score that yields a decline outcome when configured.
        schedule:
          type: string
          description: Stored schedule expression or serialized schedule config for recurring execution when used.
        created_at:
          type: string
          format: date-time
        committed_at:
          type: string
          format: date-time
          nullable: true
      required: [id, scenario_id, tenant_id, version, status, created_at]
      example:
        id: iter_01HZY8NXVYH7V3A6TQ1M2C8W4F
        scenario_id: scen_01HZY8M4TQ8XJ5G7S2B4N9K3PA
        tenant_id: tenant_demo
        version: 3
        status: live
        trigger_formula:
          kind: literal
          value: true
        score_review_threshold: 50
        score_block_and_review_threshold: 80
        score_decline_threshold: 95
        schedule: ""
        created_at: '2026-07-14T09:01:00Z'
        committed_at: '2026-07-14T09:10:00Z'
    UpdateIterationRequest:
      type: object
      description: Mutable scenario-iteration fields. Omitted properties remain unchanged.
      properties:
        trigger_formula:
          $ref: '#/components/schemas/ASTNode'
        score_review_threshold:
          type: integer
          nullable: true
        score_block_and_review_threshold:
          type: integer
          nullable: true
        score_decline_threshold:
          type: integer
          nullable: true
        schedule:
          type: string
    MetadataIterationResponse:
      type: object
      description: Lightweight iteration record used for lists and timeline views.
      properties:
        id:
          type: string
          description: Stable iteration identifier.
        scenario_id:
          type: string
          description: Scenario that owns the iteration.
        tenant_id:
          type: string
          description: Tenant that owns the iteration.
        version:
          type: integer
          description: Iteration version number within the scenario.
        status:
          type: string
          description: Iteration lifecycle state, such as draft or live.
        created_at:
          type: string
          format: date-time
        committed_at:
          type: string
          format: date-time
          nullable: true
      required: [id, scenario_id, tenant_id, version, status, created_at]
    PublicationActionRequest:
      type: object
      properties:
        action:
          type: string
          enum: [publish, unpublish]
        iteration_id:
          type: string
      required: [action, iteration_id]
    PublicationResponse:
      type: object
      description: Recorded publication or unpublication action for a scenario iteration.
      properties:
        id:
          type: string
          description: Publication action identifier.
        tenant_id:
          type: string
          description: Tenant that owns the publication record.
        scenario_id:
          type: string
          description: Scenario affected by the publication action.
        iteration_id:
          type: string
          description: Iteration that was published or unpublished.
        action:
          type: string
          description: Publication action performed, typically publish or unpublish.
        created_at:
          type: string
          format: date-time
      required: [id, tenant_id, scenario_id, iteration_id, action, created_at]
    PublicationPreparationStatusResponse:
      type: object
      description: Preparation state for publishing one scenario iteration when data-model work is required first.
      properties:
        scenario_id:
          type: string
          description: Scenario whose iteration is being prepared for publication.
        iteration_id:
          type: string
          description: Iteration being checked or prepared for publication.
        preparation_required:
          type: boolean
          description: Whether publication currently depends on prerequisite preparation work.
        preparation_started:
          type: boolean
          description: Whether the required preparation work has already been started.
        preparation_finished:
          type: boolean
          description: Whether the required preparation work has finished.
        pending_items:
          type: integer
          description: Number of remaining preparation items or related jobs still blocking publication.
      required: [scenario_id, iteration_id, preparation_required, preparation_started, preparation_finished, pending_items]
      example:
        scenario_id: scen_01HZY8M4TQ8XJ5G7S2B4N9K3PA
        iteration_id: iter_01HZY8NXVYH7V3A6TQ1M2C8W4F
        preparation_required: true
        preparation_started: true
        preparation_finished: false
        pending_items: 2
    CreateRuleRequest:
      type: object
      description: Payload for creating or replacing one rule inside a scenario iteration.
      properties:
        display_order:
          type: integer
          description: Relative rule ordering inside the iteration.
        name:
          type: string
          description: Human-readable rule name.
        description:
          type: string
          description: Free-form explanation of the rule.
        formula:
          $ref: '#/components/schemas/ASTNode'
        score_modifier:
          type: integer
          description: Score contribution applied when the rule hits.
        rule_group:
          type: string
          description: Group label used to organize rules in authoring and reporting.
        snooze_group_id:
          type: string
          nullable: true
          description: Optional snooze group identifier used to suppress repeat outcomes.
        stable_rule_id:
          type: string
          description: Stable logical identifier preserved across iteration copies and publication flows.
      required: [display_order, name, description, formula, score_modifier, rule_group, stable_rule_id]
    UpdateRuleRequest:
      $ref: '#/components/schemas/CreateRuleRequest'
    RuleResponse:
      type: object
      description: Stored rule definition for one scenario iteration.
      properties:
        id:
          type: string
          description: Stable rule identifier.
        iteration_id:
          type: string
          description: Iteration that owns the rule.
        tenant_id:
          type: string
          description: Tenant that owns the rule.
        display_order:
          type: integer
          description: Relative rule ordering inside the iteration.
        name:
          type: string
          description: Human-readable rule name.
        description:
          type: string
          description: Free-form explanation of the rule.
        formula:
          $ref: '#/components/schemas/ASTNode'
        score_modifier:
          type: integer
          description: Score contribution applied when the rule hits.
        rule_group:
          type: string
          description: Group label used to organize rules in authoring and reporting.
        snooze_group_id:
          type: string
          nullable: true
          description: Optional snooze group identifier used for suppression behavior.
        stable_rule_id:
          type: string
          description: Stable logical identifier for the rule across iteration versions.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, iteration_id, tenant_id, display_order, name, description, formula, score_modifier, rule_group, stable_rule_id, created_at, updated_at]
    RuleValidationResultResponse:
      type: object
      description: Validation result for one stored rule inside a scenario iteration.
      properties:
        rule_id:
          type: string
          description: Rule that was validated.
        name:
          type: string
          description: Rule name at validation time.
        valid:
          type: boolean
          description: Whether the rule formula passed validation.
        errors:
          type: array
          description: Validation messages returned for the rule.
          items:
            type: string
      required: [rule_id, name, valid, errors]
    IterationValidationResponse:
      type: object
      description: Validation result for one scenario iteration and its rules against the current tenant model.
      properties:
        valid:
          type: boolean
          description: Whether the iteration passed validation overall.
        model_revision:
          type: string
          description: Tenant model revision used during validation when available.
        trigger_errors:
          type: array
          description: Validation messages returned for the iteration trigger formula.
          items:
            type: string
        rule_results:
          type: array
          description: Per-rule validation results.
          items:
            $ref: '#/components/schemas/RuleValidationResultResponse'
        errors:
          type: array
          description: Non-rule validation errors for the iteration.
          items:
            type: string
      required: [valid, model_revision, trigger_errors, rule_results, errors]
    RuleFunctionArgumentResponse:
      type: object
      description: One supported function argument exposed to AST authoring clients.
      properties:
        name:
          type: string
          description: Argument name used by the function.
        kind:
          type: string
          description: Expected argument type or AST value kind.
        required:
          type: boolean
          description: Whether callers must provide the argument.
        description:
          type: string
          description: Authoring guidance for the argument.
      required: [name, kind, required, description]
    RuleFunctionResponse:
      type: object
      description: One supported function available to the scenario and workflow expression builders.
      properties:
        name:
          type: string
          description: Function name used in AST formulas.
        category:
          type: string
          description: High-level function grouping shown in authoring clients.
        description:
          type: string
          description: Human-readable explanation of what the function does.
        return_type:
          type: string
          description: Value type returned by the function.
        positional_arity:
          type: integer
          nullable: true
          description: Required positional argument count when the function uses fixed arity.
        supports_named_args:
          type: boolean
          description: Whether named arguments are supported.
        arguments:
          type: array
          description: Supported function arguments in authoring order.
          items:
            $ref: '#/components/schemas/RuleFunctionArgumentResponse'
        requires_model:
          type: boolean
          description: Whether the function depends on the tenant data model metadata.
        requires_data_read:
          type: boolean
          description: Whether the function reads stored record data during evaluation.
        requires_platform:
          type: boolean
          description: Whether the function depends on helper/platform data such as lists or tags.
        example:
          type: string
          description: Example formula snippet showing how to call the function.
      required: [name, category, description, return_type, supports_named_args, arguments, requires_model, requires_data_read, requires_platform, example]
    EvaluateDecisionRequest:
      type: object
      description: Record payload used to evaluate one scenario or execution request.
      properties:
        object_id:
          type: string
          description: External record identifier for the evaluated object.
        object_type:
          type: string
          description: Object type being evaluated. In practice this is the tenant data-model table name for the record.
        fields:
          type: object
          additionalProperties: true
          description: Raw record fields supplied to the evaluator.
      required: [object_id, object_type, fields]
      example:
        object_id: txn_100234
        object_type: transactions
        fields:
          amount: 12500
          currency: USD
          counterparty_country: NG
          customer_tenure_days: 12
    CreateDecisionRequest:
      type: object
      description: Tenant-level request to evaluate one scenario and create the resulting decision output.
      properties:
        scenario_id:
          type: string
          description: Scenario to evaluate.
        object_id:
          type: string
          description: External record identifier for the evaluated object.
        object_type:
          type: string
          description: Object type being evaluated. This matches the tenant data-model table name for the record.
        fields:
          type: object
          additionalProperties: true
          description: Raw record fields supplied to the evaluator.
      required: [scenario_id, object_id, object_type, fields]
      example:
        scenario_id: scen_01HZY8M4TQ8XJ5G7S2B4N9K3PA
        object_id: txn_100234
        object_type: transactions
        fields:
          amount: 12500
          currency: USD
    IngestionTriggerRequest:
      type: object
      description: Record-ingested callback payload used to evaluate all live scenarios for one object type.
      properties:
        object_id:
          type: string
          description: External record identifier for the ingested object.
        object_type:
          type: string
          description: Object type of the ingested record. This matches the tenant table name from the data model.
        fields:
          type: object
          additionalProperties: true
          description: Raw ingested record fields supplied to scenario evaluation.
        source:
          type: string
          description: Optional source label indicating where the ingestion trigger originated.
      required: [object_id, object_type, fields]
      example:
        object_id: txn_100234
        object_type: transactions
        fields:
          amount: 12500
          currency: USD
          customer_id: cust_778
        source: ingestion-service
    DecisionResponse:
      type: object
      description: Persisted result of evaluating one scenario against one record.
      properties:
        id:
          type: string
          description: Stable decision identifier.
        tenant_id:
          type: string
          description: Tenant that owns the decision.
        scenario_id:
          type: string
          description: Scenario that produced the decision.
        scenario_iteration_id:
          type: string
          description: Specific scenario iteration used for this evaluation.
        object_id:
          type: string
          description: External record identifier for the evaluated object.
        object_type:
          type: string
          description: Evaluated object type, matching the tenant model table name.
        outcome:
          type: string
          description: Final scenario outcome, such as approve, review, block_and_review, or decline.
        score:
          type: integer
          description: Final accumulated score for the evaluation.
        triggered:
          type: boolean
          description: Whether the scenario actually triggered and produced a persisted decision result.
        created_at:
          type: string
          format: date-time
      required: [id, tenant_id, scenario_id, scenario_iteration_id, object_id, object_type, outcome, score, triggered, created_at]
      example:
        id: dec_01HZY90B4J4QWQ5TS9N5P7DZ9C
        tenant_id: tenant_demo
        scenario_id: scen_01HZY8M4TQ8XJ5G7S2B4N9K3PA
        scenario_iteration_id: iter_01HZY8NXVYH7V3A6TQ1M2C8W4F
        object_id: txn_100234
        object_type: transactions
        outcome: review
        score: 65
        triggered: true
        created_at: '2026-07-14T10:00:00Z'
    RuleExecutionResponse:
      type: object
      description: Persisted execution record for one rule evaluated within a decision.
      properties:
        id:
          type: string
          description: Stable rule-execution identifier.
        decision_id:
          type: string
          description: Decision that this rule execution belongs to.
        rule_id:
          type: string
          description: Rule that was evaluated.
        rule_name:
          type: string
          description: Human-readable rule name at evaluation time.
        outcome:
          type: string
          description: Rule evaluation outcome, typically hit or miss style state.
        score_modifier:
          type: integer
          description: Score contribution applied by this rule execution.
        created_at:
          type: string
          format: date-time
      required: [id, decision_id, rule_id, rule_name, outcome, score_modifier, created_at]
    DecisionEvaluationResponse:
      type: object
      description: Immediate evaluation result returned by the live decisioning API.
      properties:
        triggered:
          type: boolean
          description: Whether the evaluation produced a triggered decision result.
        decision:
          allOf:
            - $ref: '#/components/schemas/DecisionResponse'
          nullable: true
          description: Persisted decision record when the scenario triggered.
        rule_executions:
          type: array
          items:
            $ref: '#/components/schemas/RuleExecutionResponse'
          description: Rule-level execution details returned for the evaluation.
      required: [triggered]
    MultiDecisionEvaluationResponse:
      type: object
      description: Evaluation results for all live scenarios triggered by one ingested record.
      properties:
        object_id:
          type: string
          description: External record identifier that was evaluated across scenarios.
        results:
          type: array
          items:
            $ref: '#/components/schemas/DecisionEvaluationResponse'
          description: Per-scenario evaluation results.
      required: [object_id, results]
    CreateTestRunRequest:
      type: object
      description: Request to compare live and phantom scenario behavior in a test run.
      properties:
        phantom_iteration_id:
          type: string
          description: Phantom iteration to evaluate alongside the current live iteration.
        expires_at:
          type: string
          format: date-time
