services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: datamodel
      POSTGRES_USER: datamodel
      POSTGRES_PASSWORD: datamodel
    ports:
      - "5434:5432"
    volumes:
      - dm_pg_data:/var/lib/postgresql/data

  data-model-service:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://datamodel:datamodel@postgres:5432/datamodel?sslmode=disable
      PORT: 8080
      SERVICE_AUTH_MODE: disabled
      SERVICE_AUTH_TOKEN: ""
      LOG_LEVEL: debug
      GIN_MODE: release
    depends_on:
      - postgres
    ports:
      - "8088:8080"

volumes:
  dm_pg_data:
