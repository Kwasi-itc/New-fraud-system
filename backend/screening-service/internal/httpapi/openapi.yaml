openapi: 3.0.3
info:
  title: Screening Service API
  version: 0.2.0
  description: |-
    This service handles screening requests, match review, whitelist management, continuous screening,
    dataset updates, and the related file and callback flows around screening work.
tags:
  - name: Service
    description: Basic service checks, metrics, and connection details.
  - name: Provider
    description: Provider dataset and freshness endpoints used to inspect the active screening provider.
  - name: Dataset Updates
    description: Tenant-scoped dataset update jobs used to sync provider list changes.
  - name: Screenings
    description: Screening creation, lookup, retry, match review, comments, enrichment, and evidence-file flows.
  - name: Whitelist
    description: Tenant-scoped whitelist search and maintenance endpoints.
  - name: Continuous Screening
    description: Continuous-screening configuration and monitored-object management.
  - name: Internal
    description: Internal service-to-service screening intake routes.
paths:
  /healthz:
    get:
      tags: [Service]
      summary: Liveness probe
      description: Quick check that the screening service is up and responding.
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [Service]
      summary: Readiness probe
      description: Checks whether the screening service is ready to handle requests.
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Service is not ready yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /metrics:
    get:
      tags: [Service]
      summary: Get request metrics snapshot
      description: Returns the current in-memory request metrics snapshot for the service.
      responses:
        '200':
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
  /v1/service-info:
    get:
      tags: [Service]
      summary: Get service connection details
      description: Shows the downstream services and provider settings currently configured for screening-service.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Service information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceInfoResponse'
  /v1/screening-provider/catalog:
    get:
      tags: [Provider]
      summary: Get provider dataset catalog
      description: Returns the provider dataset catalog payload for the selected provider.
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: query
          description: Provider key to inspect. If omitted, the default provider is used.
          schema:
            type: string
      responses:
        '200':
          description: Provider catalog payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/screening-provider/freshness:
    get:
      tags: [Provider]
      summary: Get provider dataset freshness
      description: Returns the provider freshness payload for the selected provider.
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: query
          description: Provider key to inspect. If omitted, the default provider is used.
          schema:
            type: string
      responses:
        '200':
          description: Provider freshness payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/dataset-update-jobs:
    get:
      tags: [Dataset Updates]
      summary: List dataset update jobs
      description: Lists dataset update jobs for one tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Dataset update job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Dataset Updates]
      summary: Create a dataset update job
      description: Creates a dataset update job for one tenant and provider.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetUpdateJobRequest'
            example:
              provider: opensanctions
              job_type: delta_sync
              cursor: ""
      responses:
        '201':
          description: Dataset update job created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/dataset-update-jobs/{jobId}:
    get:
      tags: [Dataset Updates]
      summary: Get one dataset update job
      description: Returns one dataset update job by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Dataset update job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/dataset-update-jobs/{jobId}/retry:
    post:
      tags: [Dataset Updates]
      summary: Retry a dataset update job
      description: Requeues a dataset update job that needs another attempt.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Dataset update job retried
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/screenings:
    post:
      tags: [Screenings]
      summary: Create a decision-linked screening
      description: Creates a screening request tied to a decision and returns the screening record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScreeningRequest'
      responses:
        '201':
          description: Screening created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/screenings/freeform-search:
    post:
      tags: [Screenings]
      summary: Create a freeform screening
      description: Creates a manual screening request that is not tied to a decision.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScreeningRequest'
      responses:
        '201':
          description: Freeform screening created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/decisions/{decisionId}/screenings:
    get:
      tags: [Screenings]
      summary: List screenings created for a decision
      description: Lists screening records created from one decision.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/DecisionId'
      responses:
        '200':
          description: Screenings for the decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
  /v1/tenants/{tenantId}/screenings/{screeningId}:
    get:
      tags: [Screenings]
      summary: Get screening detail
      description: Returns the screening plus its related matches and comments.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScreeningId'
      responses:
        '200':
          description: Screening detail payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScreeningDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/screenings/{screeningId}/retry:
    post:
      tags: [Screenings]
      summary: Retry a screening
      description: Requeues a screening that needs another provider attempt.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScreeningId'
      responses:
        '200':
          description: Screening retried
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/screening-matches/{matchId}/review:
    post:
      tags: [Screenings]
      summary: Review a screening match
      description: Records a review outcome for one screening match and can optionally whitelist it.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewMatchRequest'
      responses:
        '200':
          description: Match reviewed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/screening-matches/{matchId}/comments:
    post:
      tags: [Screenings]
      summary: Add a comment to a screening match
      description: Adds a reviewer comment to one screening match.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/MatchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/screening-matches/{matchId}/enrich:
    post:
      tags: [Screenings]
      summary: Enrich a screening match
      description: Requests additional provider data for one screening match.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/MatchId'
      responses:
        '200':
          description: Match enriched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/screenings/{screeningId}/files:
    get:
      tags: [Screenings]
      summary: List screening files
      description: Lists file metadata attached to one screening.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScreeningId'
      responses:
        '200':
          description: Screening file list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Screenings]
      summary: Create screening file metadata
      description: Stores metadata for a file that has already been uploaded for a screening.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScreeningId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: Screening file created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/screenings/{screeningId}/file-uploads:
    post:
      tags: [Screenings]
      summary: Create a screening file upload session
      description: Creates file metadata plus a delegated upload session for a screening evidence file.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScreeningId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileUploadRequest'
      responses:
        '201':
          description: File upload session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/screenings/{screeningId}/files/{fileId}:
    get:
      tags: [Screenings]
      summary: Get one screening file
      description: Returns one file metadata record attached to the screening.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScreeningId'
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: Screening file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/screenings/{screeningId}/files/{fileId}/download:
    get:
      tags: [Screenings]
      summary: Get screening file download details
      description: Returns the delegated download details for one screening file.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScreeningId'
        - $ref: '#/components/parameters/FileId'
      responses:
        '200':
          description: File download details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/screening-whitelist:
    get:
      tags: [Whitelist]
      summary: Search whitelist entries
      description: Searches whitelist entries for one tenant by entity id or unique counterparty identifier.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: entity_id
          in: query
          description: Restrict results to one entity identifier.
          schema:
            type: string
        - name: unique_counterparty_identifier
          in: query
          description: Restrict results to one unique counterparty identifier.
          schema:
            type: string
      responses:
        '200':
          description: Whitelist entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Whitelist]
      summary: Create a whitelist entry
      description: Creates one whitelist entry for the tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWhitelistRequest'
      responses:
        '201':
          description: Whitelist entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Whitelist]
      summary: Delete a whitelist entry
      description: Deletes one whitelist entry using the entity id and optional unique counterparty identifier.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: entity_id
          in: query
          required: true
          description: Entity identifier for the whitelist entry to delete.
          schema:
            type: string
        - name: unique_counterparty_identifier
          in: query
          description: Optional unique counterparty identifier for the whitelist entry to delete.
          schema:
            type: string
      responses:
        '204':
          description: Whitelist entry deleted
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/continuous-screening-configs:
    get:
      tags: [Continuous Screening]
      summary: List continuous-screening configs
      description: Lists continuous-screening configurations for one tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Continuous-screening config list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Continuous Screening]
      summary: Create a continuous-screening config
      description: Creates one continuous-screening configuration for a tenant object type.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContinuousConfigRequest'
      responses:
        '201':
          description: Continuous-screening config created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/continuous-screening-configs/{configId}:
    get:
      tags: [Continuous Screening]
      summary: Get one continuous-screening config
      description: Returns one continuous-screening configuration by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ConfigId'
      responses:
        '200':
          description: Continuous-screening config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Continuous Screening]
      summary: Update a continuous-screening config
      description: Updates one continuous-screening configuration.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ConfigId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContinuousConfigRequest'
      responses:
        '200':
          description: Continuous-screening config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Continuous Screening]
      summary: Delete a continuous-screening config
      description: Removes one continuous-screening configuration.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ConfigId'
      responses:
        '204':
          description: Continuous-screening config deleted
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/continuous-screening-configs/{configId}/monitored-objects:
    get:
      tags: [Continuous Screening]
      summary: List monitored objects for a config
      description: Lists monitored objects attached to one continuous-screening configuration.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ConfigId'
      responses:
        '200':
          description: Monitored-object list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericArray'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Continuous Screening]
      summary: Create a monitored object
      description: Registers one monitored object under a continuous-screening configuration.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ConfigId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MonitoredObjectRequest'
      responses:
        '201':
          description: Monitored object created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/monitored-objects/{monitoredObjectId}:
    get:
      tags: [Continuous Screening]
      summary: Get one monitored object
      description: Returns one monitored object by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/MonitoredObjectId'
      responses:
        '200':
          description: Monitored object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Continuous Screening]
      summary: Delete a monitored object
      description: Removes one monitored object from continuous screening.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/MonitoredObjectId'
      responses:
        '204':
          description: Monitored object deleted
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/monitored-objects/{monitoredObjectId}/requeue:
    post:
      tags: [Continuous Screening]
      summary: Requeue a monitored object
      description: Requeues one monitored object for another screening attempt.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/MonitoredObjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequeueMonitoredObjectRequest'
      responses:
        '200':
          description: Monitored object requeued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
  /internal/v1/tenants/{tenantId}/decision-screenings:
    post:
      tags: [Internal]
      summary: Create or reuse a decision-linked screening
      description: Internal decision-engine intake endpoint. Calls are idempotent on `idempotency_key`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScreeningRequest'
      responses:
        '201':
          description: Screening created or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      description: Tenant identifier for the screening data being accessed.
      schema:
        type: string
    DecisionId:
      name: decisionId
      in: path
      required: true
      description: Decision identifier associated with the screening work.
      schema:
        type: string
        format: uuid
    ScreeningId:
      name: screeningId
      in: path
      required: true
      description: Screening identifier.
      schema:
        type: string
        format: uuid
    MatchId:
      name: matchId
      in: path
      required: true
      description: Screening-match identifier.
      schema:
        type: string
    FileId:
      name: fileId
      in: path
      required: true
      description: Screening-file identifier.
      schema:
        type: string
    ConfigId:
      name: configId
      in: path
      required: true
      description: Continuous-screening configuration identifier.
      schema:
        type: string
    JobId:
      name: jobId
      in: path
      required: true
      description: Dataset-update job identifier.
      schema:
        type: string
    MonitoredObjectId:
      name: monitoredObjectId
      in: path
      required: true
      description: Monitored-object identifier.
      schema:
        type: string
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal processing failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
      description: Flexible JSON object returned by the screening service.
    GenericArray:
      type: array
      items:
        type: object
        additionalProperties: true
      description: Flexible JSON array returned by list endpoints.
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          description: Health state.
          example: ok
        service:
          type: string
          description: Service name.
          example: screening-service
