openapi: 3.0.3
info:
  title: Decision Engine Service API
  version: 0.2.0
  description: |-
    This service helps teams define fraud scenarios, test decision logic, and review the decisions produced for tenant records.

    It also supports related workflow, screening, scoring, and execution tracking features used around the decision process.
tags:
  - name: Scenario Authoring
    description: Create and maintain tenant-owned scenarios, their draft and live iterations, publication state, and the rules that define decision logic over a target object type.
  - name: Validation
    description: AST and iteration validation against tenant data models.
  - name: Decisions
    description: Live evaluation, decision history, and ingestion-triggered execution.
  - name: Test Runs
    description: Test-run creation, listing, and evaluation.
  - name: Workflows
    description: Workflow definitions and execution records.
  - name: Execution
    description: Rule snoozes plus scheduled and asynchronous decision execution records.
  - name: Screening and Scoring
    description: Screening and scoring configuration and execution records.
  - name: Platform Helpers
    description: Helper-data endpoints consumed by evaluator functions.
  - name: Outbox
    description: Tenant-scoped outbox event inspection.
  - name: Health
    description: Basic service checks and setup details, including whether the service is running and ready to use.
  - name: Internal
    description: Internal service-to-service callbacks used by other backend services.
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      description: Quick check that the service is up and responding.
      responses:
        '200':
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Checks whether the service is ready to handle requests.
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '503':
          description: Service is not ready yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyErrorResponse'
  /v1/service-info:
    get:
      tags: [Health]
      summary: Service metadata and upstream URLs
      description: Shows basic service details and the other services it is connected to.
      responses:
        '200':
          description: Service details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceInfo'
  /v1/rule-functions:
    get:
      tags: [Validation]
      summary: List supported rule functions for AST authoring
      description: Returns the AST function catalog used by scenario and rule authoring clients.
      responses:
        '200':
          description: Rule function catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleFunctionListEnvelope'
  /v1/tenants/{tenantId}/scenarios:
    get:
      tags: [Scenario Authoring]
      summary: List scenarios for one tenant
      description: Lists the scenario definitions owned by one tenant.
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Scenario list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Scenario Authoring]
      summary: Create a scenario
      description: Creates a new scenario shell for one tenant. The scenario is later versioned through iterations.
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScenarioRequest'
      responses:
        '201':
          description: Scenario created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/UpstreamError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}:
    get:
      tags: [Scenario Authoring]
      summary: Get one scenario
      description: Returns one scenario definition by id.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Scenario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Scenario Authoring]
      summary: Update one scenario
      description: Updates mutable scenario metadata such as name, description, and trigger object type.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScenarioRequest'
      responses:
        '200':
          description: Scenario updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/UpstreamError'
    delete:
      tags: [Scenario Authoring]
      summary: Delete one scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '204':
          description: Scenario deleted
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/copy:
    post:
      tags: [Scenario Authoring]
      summary: Copy one scenario
      description: Creates a new scenario by copying the selected scenario and its authoring state.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopyScenarioRequest'
            example:
              name: High Amount Review Copy
      responses:
        '201':
          description: Scenario copy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/rules/latest:
    get:
      tags: [Scenario Authoring]
      summary: List rules from the latest iteration
      description: Returns the rules from the most recent iteration for the scenario.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Latest rule list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/ast-ai-description:
    post:
      tags: [Scenario Authoring]
      summary: Describe a scenario expression with AI
      description: Reserved for future AI-assisted scenario explanations. This endpoint is currently not implemented.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '501':
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotImplementedResponse'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/generate-ast:
    post:
      tags: [Scenario Authoring]
      summary: Generate a scenario expression with AI
      description: Reserved for future AI-assisted rule generation. This endpoint is currently not implemented.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '501':
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotImplementedResponse'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/editor-identifiers:
    get:
      tags: [Scenario Authoring]
      summary: List payload and database accessor AST nodes for one scenario builder
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Builder accessor nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditorIdentifiersEnvelope'
        '502':
          $ref: '#/components/responses/UpstreamError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations:
    get:
      tags: [Scenario Authoring]
      summary: List iterations for one scenario
      description: Lists the draft and live iterations belonging to one scenario.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Iteration list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Scenario Authoring]
      summary: Create a draft iteration
      description: Creates a new draft iteration for a scenario so rules and trigger logic can be edited safely.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '201':
          description: Iteration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/metadata:
    get:
      tags: [Scenario Authoring]
      summary: List iteration metadata for one scenario
      description: Returns a lighter-weight iteration list for timeline or picker views.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Iteration metadata list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationMetadataListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}:
    get:
      tags: [Scenario Authoring]
      summary: Get one iteration
      description: Returns one scenario iteration by id.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '200':
          description: Iteration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Scenario Authoring]
      summary: Update one draft iteration
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIterationRequest'
      responses:
        '200':
          description: Iteration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/draft:
    post:
      tags: [Scenario Authoring]
      summary: Create a draft from an iteration
      description: Creates a new draft iteration by copying the selected iteration.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '201':
          description: Draft iteration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/commit:
    post:
      tags: [Scenario Authoring]
      summary: Commit one iteration for publication
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '200':
          description: Iteration committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/deactivate:
    post:
      tags: [Scenario Authoring]
      summary: Deactivate one live iteration
      description: Unpublishes the specified live iteration so the scenario no longer has an active live iteration.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '200':
          description: Iteration deactivated and unpublish action recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/publications:
    get:
      tags: [Scenario Authoring]
      summary: List publications for one scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Publication list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Scenario Authoring]
      summary: Publish or unpublish an iteration
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationActionRequest'
      responses:
        '200':
          description: Publication actions recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/publications/preparation:
    get:
      tags: [Scenario Authoring]
      summary: Get publication preparation status for one iteration
      description: Returns whether the target iteration still requires data-model preparation work before publication can complete.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - name: iteration_id
          in: query
          required: true
          description: Iteration identifier to check for publication preparation status.
          schema:
            type: string
      responses:
        '200':
          description: Publication preparation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationPreparationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Scenario Authoring]
      summary: Start publication preparation for one iteration
      description: Starts any required data-model preparation work for the iteration and returns the updated preparation status.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                iteration_id:
                  type: string
                  description: Iteration identifier to prepare for publication.
              required: [iteration_id]
            example:
              iteration_id: iter_01HZY8NXVYH7V3A6TQ1M2C8W4F
      responses:
        '202':
          description: Publication preparation started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationPreparationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/rules:
    get:
      tags: [Scenario Authoring]
      summary: List rules for one iteration
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '200':
          description: Rule list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Scenario Authoring]
      summary: Create a rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/rule-groups:
    get:
      tags: [Scenario Authoring]
      summary: List distinct rule groups used by one scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Rule group list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleGroupListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/rules/{ruleId}:
    put:
      tags: [Scenario Authoring]
      summary: Update one rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
      responses:
        '200':
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Scenario Authoring]
      summary: Delete one rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
        - $ref: '#/components/parameters/RuleId'
      responses:
        '204':
          description: Rule deleted
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/rules/{ruleId}/ai-description:
    get:
      tags: [Scenario Authoring]
      summary: Describe a rule with AI
      description: Reserved for future AI-assisted rule explanations. This endpoint is currently not implemented.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
        - $ref: '#/components/parameters/RuleId'
      responses:
        '501':
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotImplementedResponse'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/validate:
    post:
      tags: [Validation]
      summary: Validate one iteration and its rules against the tenant model
      description: Validates the trigger formula and rule formulas for one iteration against the current tenant data model.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '200':
          description: Validation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationEnvelope'
        '422':
          description: Validation completed with rule or trigger errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationEnvelope'
        '502':
          $ref: '#/components/responses/UpstreamError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/evaluate:
    post:
      tags: [Decisions]
      summary: Evaluate one scenario against one record payload
      description: Evaluates one scenario iteration set against one record payload and returns the resulting decision and rule executions when triggered.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateDecisionRequest'
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionEvaluationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/decisions:
    get:
      tags: [Decisions]
      summary: List decisions by scenario
      description: Lists persisted decisions previously produced by one scenario.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Decision list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/tenants/{tenantId}/decisions:
    get:
      tags: [Decisions]
      summary: List decisions by tenant with optional filters
      description: Lists persisted decisions for the tenant. Use query filters to narrow by scenario or by the evaluated object.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: scenario_id
          in: query
          description: Restrict results to decisions produced by one scenario.
          schema:
            type: string
        - name: object_type
          in: query
          description: Restrict results to decisions for one object type. This matches the tenant data-model table name.
          schema:
            type: string
        - name: object_id
          in: query
          description: Restrict results to decisions for one external record identifier. Use with `object_type`.
          schema:
            type: string
      responses:
        '200':
          description: Decision list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Decisions]
      summary: Create a decision for one scenario
      description: Evaluates one scenario and returns the resulting decision using a tenant-level route.
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDecisionRequest'
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionEvaluationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/decisions/all:
    post:
      tags: [Decisions]
      summary: Create decisions across all live scenarios
      description: Evaluates all live scenarios that apply to the supplied record.
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateDecisionRequest'
      responses:
        '200':
          description: Multi-scenario evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiDecisionEvaluationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/decisions/{decisionId}:
    get:
      tags: [Decisions]
      summary: Get one decision and its rule executions
      description: Returns one persisted decision plus the rule-execution records that contributed to it.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/DecisionId'
      responses:
        '200':
          description: Decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionWithRulesEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/ingestion-events/record-ingested:
    post:
      tags: [Decisions]
      summary: Evaluate all live scenarios for an ingested record
      description: Evaluates every live scenario for the tenant that targets the ingested record's object type.
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionTriggerRequest'
      responses:
        '200':
          description: Multi-scenario evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiDecisionEvaluationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/test-runs:
    get:
      tags: [Test Runs]
      summary: List test runs by scenario
      description: Lists stored test runs for one scenario.
      parameters:
        - $ref: '#/components/parameters/TenantId'
