openapi: 3.0.3
info:
  title: Data Model Service API
  version: 0.1.0
  description: |-
    Standalone tenant-aware data model service for managing:
    - tenant registration and schema provisioning
    - logical metadata for tables, fields, links, pivots, and table options
    - physical per-tenant PostgreSQL schema changes
    - schema change history and tenant schema migration history
    - reconciliation between metadata and physical tenant schemas

    Typical workflow:
    1. Create a tenant.
    2. Provision the tenant schema.
    3. Create tables and fields.
    4. Add links, pivots, and table options as needed.
    5. Read the assembled data model through `/v1/tenants/{tenantId}/data-model`.

    Delete operations support `dry_run=true`.
    In V1, destructive operations are hard deletes. When a delete is blocked by internal dependencies, the API returns `409` with a delete report that lists the conflicts.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: health
    description: Liveness and readiness probes for runtime and database availability.
  - name: tenants
    description: Tenant registration and physical schema provisioning.
  - name: data-model
    description: CRUD operations for tables, fields, links, pivots, and table options.
  - name: index-jobs
    description: Async managed-index job enqueueing, inspection, and retry operations.
  - name: schema-changes
    description: Audit-style history for logical and physical schema operations.
  - name: reconcile
    description: Administrative reconciliation between metadata and physical tenant schemas.
paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness probe
      description: |-
        Lightweight liveness probe for process-level monitoring.

        This endpoint only tells you that the HTTP process is running and able to answer requests.
        It does not verify database connectivity or prove that the service is ready for real traffic.
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      tags: [health]
      summary: Readiness probe
      description: |-
        Readiness probe for dependency-aware health checks.

        Use this route before sending traffic to the service. A successful response means the service
        can reach its configured database and is ready to handle normal API requests.
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '503':
          description: Database is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyErrorResponse'
  /v1/tenants:
    post:
      tags: [tenants]
      operationId: createTenant
      summary: Create tenant
      description: |-
        Registers a new tenant in metadata only.

        This is the first step in the tenant lifecycle. It creates the logical tenant record that
        downstream admin flows can reference, but it does not create the tenant's physical PostgreSQL
        schema yet. Call the provision endpoint separately when the tenant should become writable.

        The operation also records audit-oriented schema history so tenant registration is visible in
        both schema-change logs and tenant schema migration history.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
            example:
              name: Acme Risk Ops
              external_key: acme-prod
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
              example:
                tenant:
                  id: f2a11b37-5d51-4f62-8de6-fb9c8f4ee3a7
                  name: Acme Risk Ops
                  external_key: acme-prod
                  schema_name: tenant_f2a11b37
                  status: pending
                  created_at: "2026-07-13T10:00:00Z"
                  updated_at: "2026-07-13T10:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [tenants]
      operationId: listTenants
      summary: List tenants
      description: |-
        Returns the known tenant metadata records.

        Use this to inspect registration state, provisioning status, and basic tenant identity
        information before performing schema-management work against a specific tenant.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}:
    get:
      tags: [tenants]
      operationId: getTenant
      summary: Get tenant
      description: |-
        Returns one tenant metadata record by id.

        This is useful when another service or admin tool already knows the tenant id and needs to
        confirm whether the tenant exists and whether provisioning has already happened.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/provision:
    post:
      tags: [tenants]
      operationId: provisionTenant
      summary: Provision tenant schema
      description: |-
        Provisions the physical PostgreSQL schema for a registered tenant.

        This is the step that makes the tenant structurally ready for tables, fields, and ingestion-safe
        model publication. The service creates the tenant schema, updates provisioning state, and records
        the operation in schema-change history.

        After provisioning, the tenant becomes active and is ready for table and field creation flows.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tenant provisioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
              example:
                tenant:
                  id: f2a11b37-5d51-4f62-8de6-fb9c8f4ee3a7
                  name: Acme Risk Ops
                  external_key: acme-prod
                  schema_name: tenant_f2a11b37
                  status: active
                  created_at: "2026-07-13T10:00:00Z"
                  updated_at: "2026-07-13T10:05:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/data-model:
    get:
      tags: [data-model]
      operationId: getAssembledDataModel
      summary: Get assembled data model
      description: |-
        Returns the assembled tenant data model used as the downstream ingestion contract.

        This is the main read-model endpoint for consumers such as `ingestion-service`. The response
        includes the published `revision_id`, tenant writability metadata, managed system fields, and
        the assembled table, field, link, pivot, navigation-option, and table-option graph.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Assembled data model
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_model:
                    $ref: '#/components/schemas/AssembledDataModel'
              example:
                data_model:
                  revision_id: rev_2026_07_13_001
                  ingestion_contract:
                    tenant_status: active
                    writable: true
                    managed_system_fields: [id, object_id, updated_at, valid_from, valid_until]
                    record_lookup_field: object_id
                    partial_updates: true
                  tables:
                    transactions:
                      id: 8c9b9e5d-73ea-46c6-9f47-e6b7fa9c1d7c
                      name: transactions
                      description: Card and transfer transactions
                      alias: Transactions
                      semantic_type: entity
                      caption_field: object_id
                      archived: false
                      fields:
                        object_id:
                          id: 74d63b85-4781-4f70-b9ff-289a8cb74668
                          name: object_id
                          description: External record identifier
                          data_type: string
                          nullable: false
                          is_enum: false
                          is_unique: true
                          archived: false
                          enum_values: []
                      links_to_single: {}
                      navigation_options: []
                      options: null
                  pivots: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}/data-model/export:
    get:
      tags: [data-model]
      operationId: exportPortableDataModel
      summary: Export portable data model JSON
      description: |-
        Exports the tenant model as a portable JSON document.

        The export uses stable names rather than source UUIDs so the model can be moved into another
        tenant or environment. Managed system fields are omitted because the service recreates them
        automatically during normal tenant-schema management.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Portable data model export
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_model:
                    $ref: '#/components/schemas/PortableDataModelDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}/data-model/import:
    post:
      tags: [data-model]
      operationId: importPortableDataModel
      summary: Import portable data model JSON
      description: |-
        Imports a portable model document into an existing tenant.

        The service replays normal creation flows for tables, fields, links, pivots, table options,
        and navigation options instead of bypassing domain logic. Import is best-effort across many
        operations and is not wrapped in one global transaction for the entire document, so partial
        success is possible if later steps fail.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortableImportRequest'
      responses:
        '200':
          description: Portable data model imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortableImportResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}/tables:
    get:
      tags: [data-model]
      operationId: listTables
      summary: List tenant tables
      description: |-
        Lists the logical tables defined for one tenant.

        Use this for admin screens and service workflows that need a direct table listing without
        reading the full assembled data model payload.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Table list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tables:
                    type: array
                    items:
                      $ref: '#/components/schemas/Table'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [data-model]
      operationId: createTable
      summary: Create table
      description: |-
        Creates a new logical table for a tenant and applies the matching physical schema change.

        The tenant must already be provisioned. The service writes metadata and creates the backing
        tenant table in PostgreSQL as one managed workflow so logical and physical state stay aligned.

        The managed create flow also establishes the platform baseline for a tenant object table,
        including default metadata fields such as `object_id` and `updated_at`, service-owned physical
        columns, and the default unique index on `object_id`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableRequest'
            example:
              name: transactions
              description: Card and transfer transactions
              alias: Transactions
              semantic_type: entity
      responses:
        '201':
          description: Table created
          content:
            application/json:
              schema:
                type: object
                properties:
                  table:
                    $ref: '#/components/schemas/Table'
              example:
                table:
                  id: 8c9b9e5d-73ea-46c6-9f47-e6b7fa9c1d7c
                  name: transactions
                  description: Card and transfer transactions
                  alias: Transactions
                  semantic_type: entity
                  caption_field: object_id
                  archived: false
                  created_at: "2026-07-13T10:10:00Z"
                  updated_at: "2026-07-13T10:10:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tables/{tableId}:
    patch:
      tags: [data-model]
      operationId: updateTable
      summary: Update table
      description: |-
        Updates mutable table metadata for an existing table.

        This route is intended for safe metadata edits only. The logical table name is immutable after
        creation, so callers should treat table identity as stable and update only supported fields.

        Common mutable fields here are `description`, `alias`, `semantic_type`, and `caption_field`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTableRequest'
      responses:
        '200':
          description: Table updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  table:
                    $ref: '#/components/schemas/Table'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [data-model]
      operationId: deleteTable
      summary: Delete table
      description: |-
        Deletes a table from metadata and from the tenant's physical schema.

        Use `dry_run=true` first when you need a preflight check. The service validates whether links,
        pivots, or other internal dependencies still reference the table. If deletion is blocked, the
        API returns `409` with a structured conflict report instead of partially deleting anything.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
        - $ref: '#/components/parameters/DryRun'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Delete conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
  /v1/tables/{tableId}/fields:
    get:
      tags: [data-model]
      operationId: listFields
      summary: List table fields
      description: |-
        Lists the logical fields defined on one table.

        This is a narrower alternative to reading the full assembled model when a client already knows
        the target table and only needs direct field metadata.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      responses:
        '200':
          description: Field list
          content:
            application/json:
              schema:
                type: object
                properties:
                  fields:
                    type: array
                    items:
                      $ref: '#/components/schemas/Field'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [data-model]
      operationId: createField
      summary: Create field
      description: |-
        Creates a field and applies the matching physical column change.

        The service validates field rules, writes metadata, and updates the tenant table schema in the
        same managed flow. For enum fields, inline enum values can be created transactionally as part of
        the request.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldRequest'
            example:
              name: amount
              description: Transaction amount in account currency
              data_type: float
              nullable: false
              is_enum: false
              is_unique: false
      responses:
        '201':
          description: Field created
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    $ref: '#/components/schemas/Field'
              example:
                field:
                  id: 2d27b52d-ccf7-4f21-9815-4241e0bfdf25
                  name: amount
                  description: Transaction amount in account currency
                  data_type: float
                  nullable: false
                  is_enum: false
                  is_unique: false
                  archived: false
                  created_at: "2026-07-13T10:12:00Z"
                  updated_at: "2026-07-13T10:12:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/fields/{fieldId}/enum-values:
    get:
      tags: [data-model]
      operationId: listFieldEnumValues
      summary: List field enum values
      description: |-
        Returns the configured enum values for one managed enum field.

        Use this when editing or inspecting constrained field values without reloading the broader model.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FieldId'
      responses:
        '200':
          description: Enum value list
          content:
            application/json:
              schema:
                type: object
                properties:
                  enum_values:
                    type: array
                    items:
                      $ref: '#/components/schemas/FieldEnumValue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [data-model]
      operationId: createFieldEnumValue
      summary: Create field enum value
      description: |-
        Adds one managed enum value to an enum-enabled field.

        This route is only valid for fields configured with `is_enum=true` and should be treated as part
        of the field's published ingestion contract.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FieldId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFieldEnumValueRequest'
      responses:
        '201':
          description: Enum value created
          content:
            application/json:
              schema:
                type: object
                properties:
                  enum_value:
                    $ref: '#/components/schemas/FieldEnumValue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/fields/{fieldId}:
    patch:
      tags: [data-model]
      operationId: updateField
      summary: Update field
      description: |-
        Updates mutable field metadata and applies compatible physical schema changes when required.

        Typical uses include display-name changes, optionality changes, uniqueness configuration, and
        other supported field-level edits. The service preserves invariants around reserved names and
        incompatible schema transitions.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FieldId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldRequest'
      responses:
        '200':
          description: Field updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  field:
                    $ref: '#/components/schemas/Field'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [data-model]
      operationId: deleteField
      summary: Delete field
      description: |-
        Deletes a field from metadata and removes the backing physical column when allowed.

        Use `dry_run=true` to inspect dependency conflicts first. The delete can be blocked when links,
        pivots, navigation rules, or other internal references still depend on the field.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FieldId'
        - $ref: '#/components/parameters/DryRun'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
              example:
                performed: false
                conflicts:
                  reserved: false
                  links:
                    - 5e5f70f5-af0c-4b53-84af-c7064bf420a7
                  pivots: []
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Delete conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
              example:
                performed: false
                conflicts:
                  reserved: false
                  links:
                    - 5e5f70f5-af0c-4b53-84af-c7064bf420a7
                  pivots: []
  /v1/enum-values/{enumValueId}:
    patch:
      tags: [data-model]
      operationId: updateFieldEnumValue
      summary: Update field enum value
      description: |-
        Updates one managed enum value.

        This should be used for safe label or value maintenance on an enum field's allowed-value set.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EnumValueId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFieldEnumValueRequest'
      responses:
        '200':
          description: Enum value updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  enum_value:
                    $ref: '#/components/schemas/FieldEnumValue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [data-model]
      operationId: deleteFieldEnumValue
      summary: Delete field enum value
      description: |-
        Deletes one managed enum value from a field.

        Removing enum values changes the downstream allowed-value contract, so callers should treat this
        as a schema-management action rather than a UI-only metadata edit.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EnumValueId'
      responses:
        '204':
          description: Enum value deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/links:
    get:
      tags: [data-model]
      operationId: listLinks
      summary: List tenant links
      description: |-
        Lists the logical cross-table links defined for one tenant.

        Links describe how tables relate to each other and are later consumed by higher-level traversal,
        navigation, and decisioning flows.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Link list
          content:
            application/json:
              schema:
                type: object
                properties:
                  links:
                    type: array
                    items:
                      $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [data-model]
      operationId: createLink
      summary: Create link
      description: |-
        Creates a logical relationship between two fields in the tenant model.

        This establishes graph structure used by downstream navigation and relationship-aware features.
        The request should reference compatible parent and child fields from the same tenant model.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLinkRequest'
      responses:
        '201':
          description: Link created
          content:
            application/json:
              schema:
                type: object
                properties:
                  link:
                    $ref: '#/components/schemas/Link'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/links/{linkId}:
    delete:
      tags: [data-model]
      operationId: deleteLink
      summary: Delete link
      description: |-
        Deletes a stored link definition.

        Use `dry_run=true` to inspect whether pivots or other internal metadata still depend on the link
        before executing the delete.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LinkId'
        - $ref: '#/components/parameters/DryRun'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Delete conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
  /v1/tenants/{tenantId}/pivots:
    get:
      tags: [data-model]
      operationId: listPivots
      summary: List pivots
      description: |-
        Lists pivot definitions for one tenant.

        Pivots capture reusable relationship traversal metadata rooted at a base table and can be used by
        downstream systems that need stable graph navigation semantics.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Pivot list
          content:
            application/json:
              schema:
                type: object
                properties:
                  pivots:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pivot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [data-model]
      operationId: createPivot
      summary: Create pivot
      description: |-
        Creates a pivot rooted at a base table.

        A pivot can optionally reference a field and a path of link ids that describe how traversal should
        move through the tenant model. This is metadata only, but it is important for higher-level
        navigation and relationship-aware consumers.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePivotRequest'
      responses:
        '201':
          description: Pivot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  pivot:
                    $ref: '#/components/schemas/Pivot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/pivots/{pivotId}:
    delete:
      tags: [data-model]
      operationId: deletePivot
      summary: Delete pivot
      description: |-
        Deletes a pivot definition.

        Use `dry_run=true` when you want a preflight delete report without changing state. This is useful
        when cleaning up relationship metadata or before reshaping traversal rules.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PivotId'
        - $ref: '#/components/parameters/DryRun'
      responses:
        '200':
          description: Delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tables/{tableId}/options:
    get:
      tags: [data-model]
      operationId: getTableOptions
      summary: Get table options
      description: |-
        Returns the stored table options for one table.

        The payload is enriched with resolved field details so UI clients do not need to separately map
        ids back to field names when rendering visible columns, field order, or related presentation state.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      responses:
        '200':
          description: Table options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [data-model]
      operationId: upsertTableOptions
      summary: Upsert table options
      description: |-
        Creates or replaces UI-oriented table options for one table.

        This is the write surface for display-oriented metadata such as visible fields and ordering. It
        does not change the physical tenant schema.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableOptionsRequest'
      responses:
        '200':
          description: Table options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableOptions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tables/{tableId}/navigation-options:
    get:
      tags: [data-model]
      operationId: listNavigationOptions
      summary: List navigation options
      description: |-
        Returns stored navigation options for a source table.

        Navigation options are read-oriented metadata that help clients move from one table into related
        records. The response includes resolved names so consumers can render the options directly.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      responses:
        '200':
          description: Navigation options
          content:
            application/json:
              schema:
                type: object
                properties:
                  navigation_options:
                    type: array
                    items:
                      $ref: '#/components/schemas/NavigationOption'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [data-model]
      operationId: createNavigationOption
      summary: Create navigation option
      description: |-
        Creates one navigation option for a source table.

        Besides storing metadata, this operation also enqueues a managed-index job for the target table so
        the supporting index infrastructure can be applied asynchronously when needed.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TableId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNavigationOptionRequest'
            example:
              source_field_id: 6f39c61f-78bd-4e32-964f-4c430a9dd44c
              target_table_id: 8c9b9e5d-73ea-46c6-9f47-e6b7fa9c1d7c
              filter_field_id: 3d932fd8-a6c8-4845-8d8e-0c1d2ec71f99
              ordering_field_id: 4f7db85b-febf-49f8-a26b-bb6495f4b88a
      responses:
        '201':
          description: Navigation option created
          content:
            application/json:
              schema:
                type: object
                properties:
                  navigation_option:
                    $ref: '#/components/schemas/NavigationOption'
              example:
                navigation_option:
                  id: 1dbf0c98-95d5-4897-a3dc-96fb1150e925
                  tenant_id: f2a11b37-5d51-4f62-8de6-fb9c8f4ee3a7
                  source_table_id: b3f2a0d1-98c7-4e8e-a026-b2782081278f
                  source_field_id: 6f39c61f-78bd-4e32-964f-4c430a9dd44c
                  target_table_id: 8c9b9e5d-73ea-46c6-9f47-e6b7fa9c1d7c
                  filter_field_id: 3d932fd8-a6c8-4845-8d8e-0c1d2ec71f99
                  ordering_field_id: 4f7db85b-febf-49f8-a26b-bb6495f4b88a
                  source_table_name: accounts
                  source_field_name: object_id
                  target_table_name: transactions
                  filter_field_name: account_id
                  ordering_field_name: updated_at
                  created_at: "2026-07-13T10:20:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/navigation-options/{navigationOptionId}:
    delete:
      tags: [data-model]
      operationId: deleteNavigationOption
      summary: Delete navigation option
      description: |-
        Deletes a stored navigation option.

        Use this when a navigation path is no longer valid or no longer desirable in downstream clients.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/NavigationOptionId'
      responses:
        '204':
          description: Navigation option deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/schema-change-log:
    get:
      tags: [schema-changes]
      operationId: listSchemaChanges
      summary: List schema changes
      description: |-
        Returns the schema-change audit log for one tenant.

        This history includes logical metadata changes and physical schema work so operators can inspect
        how the tenant model evolved over time.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Schema changes
          content:
            application/json:
              schema:
                type: object
                properties:
                  schema_changes:
                    type: array
                    items:
                      $ref: '#/components/schemas/SchemaChange'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/tenants/{tenantId}/index-jobs:
    get:
      tags: [index-jobs]
      operationId: listIndexJobs
      summary: List index jobs
      description: |-
        Lists managed secondary-index jobs for one tenant.

        Use this to inspect pending, applied, or failed async index work created by navigation or other
        schema-management actions.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Index jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  index_jobs:
                    type: array
                    items:
                      $ref: '#/components/schemas/IndexJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [index-jobs]
      operationId: createIndexJob
      summary: Create index job
      description: |-
        Enqueues one managed secondary-index job.

        This is the manual or service-driven entrypoint for async index creation when the supporting index
        work should be handled by the worker rather than inline with the original request.

        The service currently accepts managed job types such as `navigation`, `search`, and `repair`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIndexJobRequest'
            example:
              table_id: 8c9b9e5d-73ea-46c6-9f47-e6b7fa9c1d7c
              index_type: navigation
              columns: [account_id, updated_at]
              requested_by_operation: create_navigation_option
      responses:
        '201':
          description: Index job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  index_job:
                    $ref: '#/components/schemas/IndexJob'
              example:
                index_job:
                  id: 855b6e0c-84a5-4e68-b695-d96cf3bfb764
                  tenant_id: f2a11b37-5d51-4f62-8de6-fb9c8f4ee3a7
                  table_id: 8c9b9e5d-73ea-46c6-9f47-e6b7fa9c1d7c
                  table_name: transactions
                  index_type: navigation
                  columns: [account_id, updated_at]
                  status: pending
                  requested_by_operation: create_navigation_option
                  error_message: null
                  attempt_count: 0
                  requested_at: "2026-07-13T10:22:00Z"
                  started_at: null
                  completed_at: null
                  scheduled_at: null
                  dedupe_key: 7ab8b76f3ce96ca9da6dc43f0c3f9d0e3ecfb650
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/index-jobs/{jobId}:
    get:
      tags: [index-jobs]
      operationId: getIndexJob
      summary: Get index job
      description: |-
        Returns one managed-index job by id.

        This is useful for polling worker-owned progress after enqueueing or retrying an index job.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Index job
          content:
            application/json:
              schema:
                type: object
                properties:
                  index_job:
                    $ref: '#/components/schemas/IndexJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/index-jobs/{jobId}/retry:
    post:
      tags: [index-jobs]
      operationId: retryIndexJob
      summary: Retry index job
      description: |-
        Schedules a failed index job to be retried.

        The service moves the job back into a pending state so the worker can claim and reattempt it.
        This is intended for operational recovery after transient failures.

        Retrying does not execute the index inline on the request path; it only reschedules the job for
        the background worker.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Index job retry scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  index_job:
                    $ref: '#/components/schemas/IndexJob'
              example:
                index_job:
                  id: 855b6e0c-84a5-4e68-b695-d96cf3bfb764
                  tenant_id: f2a11b37-5d51-4f62-8de6-fb9c8f4ee3a7
                  table_id: 8c9b9e5d-73ea-46c6-9f47-e6b7fa9c1d7c
                  table_name: transactions
                  index_type: navigation
                  columns: [account_id, updated_at]
                  status: pending
                  requested_by_operation: create_navigation_option
                  error_message: null
                  attempt_count: 1
                  requested_at: "2026-07-13T10:22:00Z"
                  started_at: null
                  completed_at: null
                  scheduled_at: "2026-07-13T10:25:00Z"
                  dedupe_key: 7ab8b76f3ce96ca9da6dc43f0c3f9d0e3ecfb650
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/schema-migrations:
    get:
      tags: [schema-changes]
      operationId: listTenantSchemaMigrations
      summary: List tenant schema migrations
      description: |-
        Returns the applied tenant-schema migration history for one tenant.

        This is more migration-oriented than the schema-change log and is useful when operators need to
        inspect the physical schema lifecycle rather than high-level change events alone.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Tenant schema migration history
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_schema_migrations:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantSchemaMigration'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/admin/reconcile:
    get:
      tags: [reconcile]
      operationId: reconcileSchemas
      summary: Run schema reconciliation
      description: |-
        Compares metadata expectations against physical tenant schemas and reports drift.

        This is an administrative repair-oriented endpoint. In addition to reporting mismatches, it can
        schedule managed-index repair jobs when expected secondary indexes are missing from tenant schemas.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reconciliation report
          content:
            application/json:
              schema:
                type: object
                properties:
                  report:
                    $ref: '#/components/schemas/ReconcileReport'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Reconciliation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: >
        Required for /v1 routes when auth mode is set to token.
        In local development, auth may be disabled entirely.
  parameters:
    TenantId:
      name: tenantId
      in: path
      required: true
      description: Tenant identifier. This must refer to a tenant registered in the data model service.
      schema:
        type: string
        format: uuid
    TableId:
      name: tableId
      in: path
      required: true
      description: Table identifier for one logical tenant-owned table in the data model.
      schema:
        type: string
        format: uuid
    FieldId:
      name: fieldId
      in: path
      required: true
      description: Field identifier for one logical field in a tenant table.
      schema:
        type: string
        format: uuid
    LinkId:
      name: linkId
      in: path
      required: true
      description: Link identifier for one logical relationship between tenant tables.
      schema:
        type: string
        format: uuid
    PivotId:
      name: pivotId
      in: path
      required: true
      description: Pivot identifier for one stored traversal definition.
      schema:
        type: string
        format: uuid
    NavigationOptionId:
      name: navigationOptionId
      in: path
      required: true
      description: Navigation option identifier for one stored related-record navigation rule.
      schema:
        type: string
        format: uuid
    JobId:
      name: jobId
      in: path
      required: true
      description: Managed index-job identifier.
      schema:
        type: string
        format: uuid
    EnumValueId:
      name: enumValueId
      in: path
      required: true
      description: Enum value identifier for one managed field enum entry.
      schema:
        type: string
        format: uuid
    DryRun:
      name: dry_run
      in: query
      required: false
      description: "When true, validates delete preconditions and returns a delete report without performing the delete."
      schema:
        type: boolean
  responses:
    BadRequest:
      description: Invalid input, invalid id, or failed domain validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    StatusResponse:
      type: object
      description: Simple health status envelope.
      properties:
        status:
          type: string
          example: ok
      required: [status]
    ReadyErrorResponse:
      type: object
      description: Readiness failure envelope.
      properties:
        status:
          type: string
        error:
          type: string
      required: [status, error]
    ErrorEnvelope:
      type: object
      description: Standard error envelope used by request validation and not-found responses.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: bad_parameter
            message:
              type: string
              example: invalid tenantId
          required: [code, message]
      required: [error]
    CreateTenantRequest:
      type: object
      description: Payload for registering a tenant before physical schema provisioning.
      required: [name]
      properties:
        name:
          type: string
          example: Acme Risk Ops
        external_key:
          type: string
          nullable: true
          example: acme-prod
      example:
        name: Acme Risk Ops
        external_key: acme-prod
    Tenant:
      type: object
      description: Tenant metadata record.
      properties:
        id:
          type: string
          format: uuid
          description: Stable tenant identifier used across all tenant-scoped routes.
        name:
          type: string
          description: Human-facing tenant name.
        external_key:
          type: string
          nullable: true
          description: Optional caller-managed external identifier for the tenant.
        schema_name:
          type: string
          example: tenant_f2a11b37
          description: Physical PostgreSQL schema name allocated to this tenant.
        status:
          type: string
          example: active
          description: Tenant lifecycle state such as `pending` before provisioning or `active` after provisioning.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, schema_name, status, created_at, updated_at]
      example:
        id: f2a11b37-5d51-4f62-8de6-fb9c8f4ee3a7
        name: Acme Risk Ops
        external_key: acme-prod
        schema_name: tenant_f2a11b37
        status: active
        created_at: "2026-07-13T10:00:00Z"
        updated_at: "2026-07-13T10:05:00Z"
    CreateTableRequest:
      type: object
      description: Payload for creating a logical table in a tenant.
      required: [name]
      properties:
        name:
          type: string
          example: transactions
        description:
          type: string
        alias:
          type: string
          example: Transactions
        semantic_type:
          type: string
          example: entity
      example:
        name: transactions
        description: Card and transfer transactions
        alias: Transactions
        semantic_type: entity
    UpdateTableRequest:
      type: object
      description: Mutable fields for a table. Omitted properties remain unchanged.
      properties:
        description:
          type: string
        alias:
          type: string
        semantic_type:
          type: string
        caption_field:
          type: string
          example: object_id
      example:
        alias: Transactions
        caption_field: object_id
    Table:
      type: object
      description: Table metadata record.
      properties:
        id:
          type: string
          format: uuid
          description: Stable table identifier.
        name:
          type: string
          description: Technical table name used in the model and assembled contract.
        description:
          type: string
          description: Free-form description of the table's purpose.
        alias:
          type: string
          description: Human-facing display label for the table.
        semantic_type:
          type: string
          description: Business-meaning hint for the table, such as entity category metadata.
        caption_field:
          type: string
          description: Preferred field name to use as the human-readable label for records in this table.
        archived:
          type: boolean
          description: Whether the table is archived in the logical model.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, description, alias, semantic_type, caption_field, archived, created_at, updated_at]
      example:
        id: 8c9b9e5d-73ea-46c6-9f47-e6b7fa9c1d7c
        name: transactions
        description: Card and transfer transactions
        alias: Transactions
        semantic_type: entity
        caption_field: object_id
        archived: false
        created_at: "2026-07-13T10:10:00Z"
        updated_at: "2026-07-13T10:10:00Z"
    CreateFieldRequest:
      type: object
      description: Payload for creating a field and its backing physical column.
      required: [name, data_type]
      properties:
        name:
          type: string
          example: amount
        description:
          type: string
        data_type:
          type: string
          enum: [bool, int, float, string, timestamp, ip_address]
          example: float
        nullable:
          type: boolean
        is_enum:
          type: boolean
        is_unique:
          type: boolean
        enum_values:
          type: array
          description: Optional inline enum values created transactionally with the field when is_enum=true.
          items:
            $ref: '#/components/schemas/CreateFieldEnumValueRequest'
      example:
        name: amount
        description: Transaction amount in account currency
        data_type: float
        nullable: false
        is_enum: false
        is_unique: false
    UpdateFieldRequest:
      type: object
      description: Mutable field properties. Omitted properties remain unchanged.
      properties:
        description:
          type: string
        nullable:
          type: boolean
        is_enum:
          type: boolean
        is_unique:
          type: boolean
      example:
        description: Transaction amount in account currency
        nullable: false
    CreateFieldEnumValueRequest:
      type: object
      description: Payload for creating one enum value for an enum field.
      required: [value, label]
      properties:
        value:
          type: string
          example: pending
        label:
          type: string
          example: Pending
        sort_order:
          type: integer
          example: 10
    UpdateFieldEnumValueRequest:
      type: object
      description: Mutable enum value properties. Omitted properties remain unchanged.
      properties:
        value:
