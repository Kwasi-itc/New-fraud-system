openapi: 3.0.3
info:
  title: Decision Engine Service API
  version: 0.2.0
  description: |-
    Standalone Marble-inspired decision engine service for the new fraud platform.

    Current implementation status:
    - health and readiness endpoints
    - service auth middleware
    - scenario, iteration, publication, and rule authoring APIs
    - tenant-model-backed AST validation
    - decision evaluation and decision-history reads
    - test-run and phantom-decision evaluation
    - rule snooze persistence and lookup
    - workflow, screening, scoring, async-execution, and scheduled-execution records
    - platform helper-data endpoints for custom lists, record tags, risk snapshots, and IP flags
    - ingestion-triggered evaluation callback
    - worker command for batch dispatch and execution processing

    Remaining planned work:
    - settle worker model beyond the current one-shot batch processor
    - finalize downstream workflow/case side effects
    - harden relation-heavy rule-engine semantics further
tags:
  - name: Health
    description: Liveness, readiness, docs, and service metadata.
  - name: Scenario Authoring
    description: Tenant-scoped scenario, iteration, publication, and rule management.
  - name: Validation
    description: AST and iteration validation against tenant data models.
  - name: Decisions
    description: Live evaluation, decision history, and ingestion-triggered execution.
  - name: Test Runs
    description: Test-run creation, listing, and evaluation.
  - name: Workflows
    description: Workflow definitions and execution records.
  - name: Execution
    description: Rule snoozes plus scheduled and asynchronous decision execution records.
  - name: Screening and Scoring
    description: Screening and scoring configuration and execution records.
  - name: Platform Helpers
    description: Helper-data endpoints consumed by evaluator functions.
  - name: Outbox
    description: Tenant-scoped outbox event inspection.
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Liveness probe
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      tags: [Health]
      summary: Readiness probe
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '503':
          description: Database is unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyErrorResponse'
  /v1/service-info:
    get:
      tags: [Health]
      summary: Service metadata and upstream URLs
      responses:
        '200':
          description: Service info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceInfo'
  /v1/rule-functions:
    get:
      tags: [Validation]
      summary: List supported rule functions for AST authoring
      responses:
        '200':
          description: Rule function catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleFunctionListEnvelope'
  /v1/tenants/{tenantId}/scenarios:
    get:
      tags: [Scenario Authoring]
      summary: List scenarios for one tenant
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Scenario list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Scenario Authoring]
      summary: Create a scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScenarioRequest'
      responses:
        '201':
          description: Scenario created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/UpstreamError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}:
    get:
      tags: [Scenario Authoring]
      summary: Get one scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Scenario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Scenario Authoring]
      summary: Update one scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateScenarioRequest'
      responses:
        '200':
          description: Scenario updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '502':
          $ref: '#/components/responses/UpstreamError'
    delete:
      tags: [Scenario Authoring]
      summary: Delete one scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '204':
          description: Scenario deleted
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/editor-identifiers:
    get:
      tags: [Scenario Authoring]
      summary: List payload and database accessor AST nodes for one scenario builder
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Builder accessor nodes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditorIdentifiersEnvelope'
        '502':
          $ref: '#/components/responses/UpstreamError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations:
    get:
      tags: [Scenario Authoring]
      summary: List iterations for one scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Iteration list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Scenario Authoring]
      summary: Create a draft iteration
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '201':
          description: Iteration created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}:
    put:
      tags: [Scenario Authoring]
      summary: Update one draft iteration
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateIterationRequest'
      responses:
        '200':
          description: Iteration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/commit:
    post:
      tags: [Scenario Authoring]
      summary: Commit one iteration for publication
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '200':
          description: Iteration committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IterationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/deactivate:
    post:
      tags: [Scenario Authoring]
      summary: Deactivate one live iteration
      description: Unpublishes the specified live iteration so the scenario no longer has an active live iteration.
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '200':
          description: Iteration deactivated and unpublish action recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/publications:
    get:
      tags: [Scenario Authoring]
      summary: List publications for one scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Publication list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Scenario Authoring]
      summary: Publish or unpublish an iteration
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationActionRequest'
      responses:
        '200':
          description: Publication actions recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationListEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/rules:
    get:
      tags: [Scenario Authoring]
      summary: List rules for one iteration
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '200':
          description: Rule list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Scenario Authoring]
      summary: Create a rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/rule-groups:
    get:
      tags: [Scenario Authoring]
      summary: List distinct rule groups used by one scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Rule group list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleGroupListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/rules/{ruleId}:
    put:
      tags: [Scenario Authoring]
      summary: Update one rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleRequest'
      responses:
        '200':
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Scenario Authoring]
      summary: Delete one rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
        - $ref: '#/components/parameters/RuleId'
      responses:
        '204':
          description: Rule deleted
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/iterations/{iterationId}/validate:
    post:
      tags: [Validation]
      summary: Validate one iteration and its rules against the tenant model
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - $ref: '#/components/parameters/IterationId'
      responses:
        '200':
          description: Validation succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationEnvelope'
        '422':
          description: Validation completed with rule or trigger errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationEnvelope'
        '502':
          $ref: '#/components/responses/UpstreamError'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/evaluate:
    post:
      tags: [Decisions]
      summary: Evaluate one scenario against one record payload
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateDecisionRequest'
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionEvaluationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/decisions:
    get:
      tags: [Decisions]
      summary: List decisions by scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Decision list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/tenants/{tenantId}/decisions/{decisionId}:
    get:
      tags: [Decisions]
      summary: Get one decision and its rule executions
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/DecisionId'
      responses:
        '200':
          description: Decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionWithRulesEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/tenants/{tenantId}/ingestion-events/record-ingested:
    post:
      tags: [Decisions]
      summary: Evaluate all live scenarios for an ingested record
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionTriggerRequest'
      responses:
        '200':
          description: Multi-scenario evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MultiDecisionEvaluationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/test-runs:
    get:
      tags: [Test Runs]
      summary: List test runs by scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Test-run list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestRunListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Test Runs]
      summary: Create a test run
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTestRunRequest'
      responses:
        '201':
          description: Test run created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestRunEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/test-runs/{testRunId}/evaluate:
    post:
      tags: [Test Runs]
      summary: Evaluate one test run against a record payload
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/TestRunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateDecisionRequest'
      responses:
        '200':
          description: Test-run evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestRunEvaluationEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/workflows:
    get:
      tags: [Workflows]
      summary: List workflows by scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Workflow list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Workflows]
      summary: Create a workflow
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRequest'
            examples:
              createCase:
                summary: Create-case workflow for review outcomes
                value:
                  name: High amount review case
                  description: Create a case when the scenario outcome is review
                  allowed_outcomes: [review]
                  action_type: create_case
                  action_config:
                    title: High amount transaction
                    reason: Transaction amount exceeded threshold
                    source: decision-engine
                  active: true
              addTag:
                summary: Add-tag workflow for review outcomes
                value:
                  name: Tag high amount decisions
                  description: Add a tag when the scenario outcome is review
                  allowed_outcomes: [review]
                  action_type: add_tag
                  action_config:
                    tag: high_amount
                  active: true
              emitEvent:
                summary: Emit-event workflow for review outcomes
                value:
                  name: Emit high amount event
                  description: Emit an event for reviewed high amount transactions
                  allowed_outcomes: [review]
                  action_type: emit_event
                  action_config:
                    event_name: transaction.high_amount.review
                    severity: medium
                  active: true
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/workflows/reorder:
    post:
      tags: [Workflows]
      summary: Reorder workflows by scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        '204':
          description: Workflows reordered
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/workflow-rules:
    get:
      tags: [Workflows]
      summary: List structured workflow rules by scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      responses:
        '200':
          description: Workflow rule list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRuleListEnvelope'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Workflows]
      summary: Create a structured workflow rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkflowRuleRequest'
            examples:
              highAmountEscalation:
                summary: Structured workflow-rule shell for a high-amount flow
                value:
                  name: High amount escalation
                  fallthrough: false
      responses:
        '201':
          description: Workflow rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRuleEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/workflow-rules/reorder:
    post:
      tags: [Workflows]
      summary: Reorder structured workflow rules by scenario
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        '204':
          description: Workflow rules reordered
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/workflow-rules/{ruleId}:
    get:
      tags: [Workflows]
      summary: Get one structured workflow rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Workflow rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRuleEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Workflows]
      summary: Update one structured workflow rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkflowRuleRequest'
      responses:
        '200':
          description: Workflow rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowRuleEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      tags: [Workflows]
      summary: Delete one structured workflow rule
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Workflow rule deleted
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/workflow-rules/{ruleId}/conditions:
    post:
      tags: [Workflows]
      summary: Create a workflow condition
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/ScenarioId'
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowConditionRequest'
            examples:
              outcomeIn:
                summary: Require the final decision outcome to be review
                value:
                  function: outcome_in
                  params:
                    - review
              ruleHit:
                summary: Require a specific scenario rule to have hit
                value:
                  function: rule_hit
                  params:
                    rule_ids:
                      - high_amount_rule_id
              payloadEvaluates:
                summary: Require a payload expression to evaluate to true
                value:
                  function: payload_evaluates
                  params:
                    expression:
                      name: gt
                      children:
                        - name: Payload
                          children:
                            - constant: amount
                        - constant: 20000
      responses:
        '201':
          description: Workflow condition created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowConditionEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /v1/tenants/{tenantId}/scenarios/{scenarioId}/workflow-rules/{ruleId}/conditions/{conditionId}:
    put:
      tags: [Workflows]
      summary: Update a workflow condition
      parameters:
