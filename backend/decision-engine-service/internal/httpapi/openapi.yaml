    CreateWorkflowRequest:
      type: object
      description: Legacy outcome-driven workflow definition. This model triggers from final decision outcomes. Use structured workflow-rules when execution should depend on specific rule hits or payload expressions.
      properties:
        name:
          type: string
        description:
          type: string
        allowed_outcomes:
          type: array
          items:
            type: string
          description: Decision outcomes that should trigger the workflow, such as approve, review, block_and_review, or decline.
        action_type:
          type: string
          description: Supported legacy workflow actions are create_case, add_tag, and emit_event.
        action_config:
          $ref: '#/components/schemas/JSONValue'
        active:
          type: boolean
      required: [name, description, allowed_outcomes, action_type, action_config, active]
    CreateWorkflowRuleRequest:
      type: object
      description: Structured workflow-rule definition. Add conditions and actions after creating the rule. Structured workflow-rules are preferred over legacy workflows when a scenario has them.
      properties:
        name:
          type: string
          description: Human-readable name for the structured workflow rule.
        fallthrough:
          type: boolean
          description: When false, stop after this matching rule. When true, continue evaluating lower-priority workflow rules.
      required: [name, fallthrough]
    UpdateWorkflowRuleRequest:
      type: object
      properties:
        name:
          type: string
        fallthrough:
          type: boolean
      required: [name, fallthrough]
